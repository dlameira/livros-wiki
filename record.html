<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupo Record · diagnóstico editorial</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --surface2: #161616;
      --border: #1e1e1e;
      --text: #e8e0d4;
      --muted: #555;
      --muted2: #444;
      --accent: #c0392b;
      --accent2: #e74c3c;
      --gold: #c9a84c;
      --radius: 6px;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HERO ─────────────────────────────────────────────── */
    .hero {
      padding: 64px 64px 48px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 32px;
      flex-wrap: wrap;
    }

    .hero-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: normal;
      letter-spacing: 0.04em;
      color: #f5ede3;
      line-height: 1;
      margin-bottom: 10px;
    }

    .hero-sub {
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
    }

    .hero-date {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-align: right;
    }

    /* ── STATS ────────────────────────────────────────────── */
    .stats-row {
      display: flex;
      padding: 36px 64px;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }

    .stat-block {
      flex: 1;
      padding: 0 32px 0 0;
      border-right: 1px solid var(--border);
      margin-right: 32px;
    }
    .stat-block:last-child { border-right: none; margin-right: 0; }

    .stat-num {
      font-size: 2.4rem;
      font-weight: normal;
      color: #f0e8dc;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-num span { color: var(--accent); }

    .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── MOSAIC ───────────────────────────────────────────── */
    .mosaic-section {
      padding: 48px 64px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .mosaic {
      display: flex;
      gap: 6px;
      height: 200px;
      overflow: hidden;
    }

    .mosaic-cover {
      height: 100%;
      flex-shrink: 0;
      border-radius: 3px;
      overflow: hidden;
      background: var(--surface2);
    }

    .mosaic-cover img {
      height: 100%;
      width: auto;
      display: block;
      object-fit: cover;
      filter: grayscale(15%);
      transition: filter 0.3s;
    }
    .mosaic-cover img:hover { filter: grayscale(0%); }

    /* ── SELOS ────────────────────────────────────────────── */
    .selos-section {
      padding: 0 64px 80px;
    }

    .selos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 2px;
    }

    .selo-card {
      background: var(--surface);
      padding: 32px;
      border: 1px solid var(--border);
      transition: background 0.2s;
      position: relative;
    }
    .selo-card:hover { background: var(--surface2); }
    .selo-card.inativo { filter: grayscale(0.25) sepia(0.08); opacity: 0.82; }

    .tag-inativo {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      background: rgba(192,57,43,0.08);
      padding: 2px 7px;
      border-radius: 3px;
    }

    .selo-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }

    .selo-nome {
      font-size: 1.1rem;
      letter-spacing: 0.03em;
      color: #f0e8dc;
    }

    .selo-stats {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      flex-shrink: 0;
    }

    .selo-stat {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .selo-stat strong {
      color: #aaa;
      font-weight: normal;
    }

    .selo-stat.accent strong { color: var(--accent); }

    .selo-covers {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini-cover {
      width: 56px;
      height: 80px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
    }

    .mini-cover:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      z-index: 1;
      position: relative;
    }

    .mini-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .mini-cover img.loaded { opacity: 1; }

    /* ── MODAL DETALHE ────────────────────────────────────── */
    .book-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .book-overlay.open { display: flex; }

    .book-modal {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      max-width: 540px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .book-modal-inner {
      display: flex;
      gap: 28px;
      padding: 32px;
    }

    .book-modal-cover {
      width: 110px;
      flex-shrink: 0;
    }
    .book-modal-cover img {
      width: 100%;
      border-radius: 3px;
      display: block;
    }
    .book-modal-cover-placeholder {
      width: 110px;
      height: 160px;
      background: #1e1e1e;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-size: 1.5rem;
    }

    .book-modal-info { flex: 1; min-width: 0; }

    .book-modal-selo {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .book-modal-title {
      font-size: 1.15rem;
      color: #f0e8dc;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .book-modal-author {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 14px;
    }

    .book-modal-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .book-modal-tag {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: #555;
      border: 1px solid #2a2a2a;
      padding: 3px 8px;
      border-radius: 20px;
    }

    .book-modal-sinopse {
      font-size: 0.8rem;
      color: #777;
      line-height: 1.7;
      font-style: italic;
    }

    .book-modal-loading {
      font-size: 0.8rem;
      color: #555;
      font-style: italic;
    }

    .book-modal-close {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: flex-end;
      padding: 12px 16px 0;
      background: #141414;
    }

    .book-modal-close button {
      background: none;
      border: none;
      color: #555;
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      padding: 4px 8px;
    }
    .book-modal-close button:hover { color: #aaa; }

    /* ── HIT TOOLTIP ─────────────────────────────────────── */
    .hit-row {
      cursor: default;
      position: relative;
    }

    .hit-tooltip {
      position: fixed;
      z-index: 900;
      background: #181818;
      border: 1px solid #2a2a2a;
      border-radius: 5px;
      padding: 12px;
      display: none;
      gap: 12px;
      align-items: flex-start;
      max-width: 240px;
      pointer-events: none;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    }
    .hit-tooltip.visible { display: flex; }

    .hit-tooltip-cover {
      width: 54px;
      height: 78px;
      flex-shrink: 0;
      background: #222;
      border-radius: 3px;
      overflow: hidden;
    }
    .hit-tooltip-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hit-tooltip-info { flex: 1; min-width: 0; }

    .hit-tooltip-title {
      font-size: 0.75rem;
      color: #e0d8ce;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .hit-tooltip-author {
      font-size: 0.68rem;
      color: #666;
      margin-bottom: 6px;
    }
    .hit-tooltip-date {
      font-size: 0.65rem;
      color: #444;
      letter-spacing: 0.04em;
    }

    /* ── INSTAGRAM ────────────────────────────────────────── */
    .ig-block {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: var(--radius);
      margin-bottom: 14px;
    }

    .ig-icon {
      flex-shrink: 0;
      margin-top: 2px;
      color: var(--muted);
    }

    .ig-body { flex: 1; min-width: 0; }

    .ig-handle-link {
      display: inline-block;
      font-size: 0.82rem;
      font-weight: bold;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.02em;
      margin-bottom: 5px;
      transition: color 0.15s;
    }
    .ig-handle-link:hover { color: var(--gold); }

    .ig-stats {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .ig-stat {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .ig-stat strong {
      color: #aaa;
      font-weight: 600;
    }

    .ig-stat-sep { font-size: 0.65rem; color: var(--muted2); }

    .ig-bio {
      margin-top: 6px;
      font-size: 0.7rem;
      color: #555;
      font-style: italic;
      line-height: 1.45;
    }

    .ig-block-vazio {
      border-color: #181818;
      background: #0d0d0d;
    }

    .ig-block-vazio .ig-icon { opacity: 0.3; }

    .ig-sem-conta {
      font-size: 0.72rem;
      color: #3a3a3a;
      letter-spacing: 0.02em;
    }

    .mini-cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted2);
      font-size: 1rem;
    }

    .selo-logo {
      height: 36px;
      max-width: 120px;
      object-fit: contain;
      object-position: left center;
      display: block;
      margin-bottom: 10px;
      opacity: 0.85;
      filter: brightness(0) invert(1);
    }

    .selo-tag {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 4px;
    }

    .selo-desc {
      font-size: 0.8rem;
      color: #888;
      line-height: 1.6;
      margin-bottom: 20px;
      font-style: italic;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: calc(1.6em * 4);
    }

    .selo-hits {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .selo-hits-label {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 8px;
    }

    .hit-row {
      font-size: 0.76rem;
      color: #777;
      line-height: 1.8;
    }

    .selo-recent {
      margin-top: 16px;
      font-size: 0.72rem;
      color: var(--muted);
      font-style: italic;
    }

    .selo-recent strong {
      color: #888;
      font-style: normal;
      font-weight: normal;
    }

    /* ── TIMELINE ─────────────────────────────────────────── */
    .timeline-section {
      padding: 48px 64px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .timeline-bars {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 100px;
      margin-top: 24px;
    }

    .timeline-col {
      flex: 1;
      height: 100%;
      display: flex;
      align-items: flex-end;
    }

    .timeline-bar {
      width: 100%;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
      min-height: 2px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .timeline-bar:hover { opacity: 1; }

    .timeline-labels {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .timeline-year {
      flex: 1;
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* ── LOADING ──────────────────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 64px;
      color: var(--muted);
      font-size: 0.85rem;
      font-style: italic;
      gap: 12px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 1px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      padding: 48px 64px;
      color: #c0392b;
      font-size: 0.85rem;
    }

    /* ── FOOTER ───────────────────────────────────────────── */
    footer {
      padding: 32px 64px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-source {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .footer-source a {
      color: var(--gold);
      text-decoration: none;
    }
    .footer-source a:hover { text-decoration: underline; }

    .footer-brand {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    @media (max-width: 640px) {
      .hero, .stats-row, .mosaic-section, .selos-section, .timeline-section, footer {
        padding-left: 24px;
        padding-right: 24px;
      }
      .hero h1 { font-size: 2rem; }
      .stat-num { font-size: 1.8rem; }
      .selos-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div>
    <div class="hero-label">diagnóstico editorial</div>
    <h1>Grupo Record</h1>
    <div class="hero-sub">visão geral do catálogo · selos · lançamentos</div>
  </div>
  <div class="hero-date" id="hero-date"></div>
</div>

<!-- STATS -->
<div class="stats-row" id="stats-row">
  <div class="loading" style="padding:28px 0">
    <div class="spinner"></div> carregando dados…
  </div>
</div>

<!-- TIMELINE -->
<div class="timeline-section" id="timeline-section" style="display:none">
  <div class="section-title">publicações por ano</div>
  <div class="timeline-bars" id="timeline-bars"></div>
</div>

<!-- SELOS -->
<div class="selos-section" id="selos-section" style="display:none">
  <div class="section-title" style="padding-top:48px;margin-bottom:0;padding-bottom:24px">selos do grupo</div>
  <div class="selos-grid" id="selos-grid"></div>
</div>

<!-- TOOLTIP HITS -->
<div class="hit-tooltip" id="hit-tooltip">
  <div class="hit-tooltip-cover"><img id="hit-tooltip-img" src="" alt=""></div>
  <div class="hit-tooltip-info">
    <div class="hit-tooltip-title" id="hit-tooltip-title"></div>
    <div class="hit-tooltip-author" id="hit-tooltip-author"></div>
    <div class="hit-tooltip-date" id="hit-tooltip-date"></div>
  </div>
</div>

<!-- MODAL DETALHE -->
<div class="book-overlay" id="book-overlay">
  <div class="book-modal" id="book-modal">
    <div class="book-modal-close"><button onclick="closeBookModal()">✕</button></div>
    <div class="book-modal-inner" id="book-modal-inner">
      <div class="book-modal-loading">carregando…</div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-source">
    dados via <a href="https://livros.wiki" target="_blank">livros.wiki</a> · fonte Metabooks
  </div>
  <div class="footer-brand">livros.wiki · diagnóstico gerado automaticamente</div>
</footer>

<script>
  const API = 'https://directus-production-afdd.up.railway.app';

  // ── Data do relatório ──────────────────────────────────────────────────────
  const now = new Date();
  document.getElementById('hero-date').textContent =
    now.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });

  // ── Utils ──────────────────────────────────────────────────────────────────
  function esc(s = '') {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmt(n) { return n?.toLocaleString('pt-BR') || '–'; }
  function fq(obj) { return `filter=${encodeURIComponent(JSON.stringify(obj))}`; }

  // ── Main ───────────────────────────────────────────────────────────────────
  async function main() {
    try {
      // 1) Busca selos do Grupo Record
      const selosRes = await fetch(
        `${API}/items/selos?limit=200&fields=nome_display,total_livros_mb,grupo.nome` +
        `&${fq({ grupo: { nome: { _eq: 'Grupo Record' } } })}&sort=nome_display`
      );
      const selosJson = await selosRes.json();
      const selos = (selosJson.data || []).filter(s => s.nome_display);

      if (!selos.length) {
        document.getElementById('stats-row').innerHTML =
          '<div class="error">Nenhum selo encontrado para "Grupo Record". Verifique o nome do grupo no Directus.</div>';
        return;
      }

      const nomesSelos = selos.map(s => s.nome_display);
      const totalSelos = selos.length;

      // 2) Contagem total de livros
      const countRes = await fetch(
        `${API}/items/biblioteca?limit=0&meta=filter_count` +
        `&${fq({ editora: { _in: nomesSelos } })}`
      );
      const countJson  = await countRes.json();
      const totalLivros = countJson.meta?.filter_count || 0;

      // 3) Livros recentes (últimos 6 meses) para estatística
      const seisAtras = new Date(); seisAtras.setMonth(seisAtras.getMonth() - 6);
      const recentRes = await fetch(
        `${API}/items/biblioteca?limit=0&meta=filter_count` +
        `&${fq({ _and: [{ editora: { _in: nomesSelos } }, { data_publicacao: { _gte: seisAtras.toISOString().slice(0,10) } }] })}`
      );
      const recentJson = await recentRes.json();
      const totalRecent = recentJson.meta?.filter_count || 0;
      const porMes = Math.round(totalRecent / 6);

      // 4) Renderiza stats
      renderStats(totalSelos, totalLivros, porMes);

      // 6) Timeline por ano
      await renderTimeline(nomesSelos);

      // 7) Renderiza cada selo com capas
      document.getElementById('selos-section').style.display = '';
      const grid = document.getElementById('selos-grid');
      grid.innerHTML = selos.map(() => '<div class="selo-card"><div class="loading" style="padding:20px 0"><div class="spinner"></div></div></div>').join('');

      // Carrega os selos em paralelo, em lotes de 4
      for (let i = 0; i < selos.length; i += 4) {
        const batch = selos.slice(i, i + 4);
        await Promise.all(batch.map((s, bi) => loadSelo(s, i + bi, grid)));
      }

      // 8) Reordena: inativos (0 lançamentos 6m E 0 pré-venda) vão para o final, apagados
      const allCards = Array.from(grid.children);
      const isInativo = c => parseInt(c.dataset.lanc ?? '1') === 0 && parseInt(c.dataset.prev ?? '1') === 0;
      const ativos   = allCards.filter(c => !isInativo(c));
      const inativos = allCards.filter(c =>  isInativo(c));
      inativos.forEach(c => c.classList.add('inativo'));
      [...ativos, ...inativos].forEach(c => grid.appendChild(c));

    } catch(e) {
      console.error(e);
      document.getElementById('stats-row').innerHTML =
        `<div class="error">Erro ao carregar dados: ${esc(e.message)}</div>`;
    }
  }

  function renderStats(nSelos, nLivros, porMes) {
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-block">
        <div class="stat-num">${fmt(nSelos)}</div>
        <div class="stat-label">selos ativos</div>
      </div>
      <div class="stat-block">
        <div class="stat-num">${fmt(nLivros)}</div>
        <div class="stat-label">títulos no catálogo</div>
      </div>
      <div class="stat-block">
        <div class="stat-num">${fmt(porMes)}<span>/mês</span></div>
        <div class="stat-label">lançamentos (média 6m)</div>
      </div>
      <div class="stat-block">

        <div class="stat-label">títulos por selo (média)</div>
      </div>
    `;
  }

  async function renderTimeline(nomesSelos) {
    const currentYear = new Date().getFullYear();
    const years = [];
    for (let y = 2015; y <= currentYear; y++) years.push(y);

    // Busca contagens por ano usando filtros de data
    const counts = {};
    await Promise.all(years.map(async y => {
      try {
        const r = await fetch(
          `${API}/items/biblioteca?limit=0&meta=filter_count` +
          `&${fq({ _and: [{ editora: { _in: nomesSelos } }, { data_publicacao: { _gte: `${y}-01-01`, _lte: `${y}-12-31` } }] })}`
        );
        const j = await r.json();
        counts[y] = j.meta?.filter_count || 0;
      } catch { counts[y] = 0; }
    }));

    const maxCount = Math.max(...Object.values(counts), 1);
    const section  = document.getElementById('timeline-section');
    const bars     = document.getElementById('timeline-bars');
    section.style.display = '';

    bars.innerHTML = years.map(y => {
      const c   = counts[y] || 0;
      const pct = Math.max((c / maxCount) * 100, c > 0 ? 3 : 0);
      return `<div class="timeline-col" title="${fmt(c)} livros em ${y}"><div class="timeline-bar" style="height:${pct}%"></div></div>`;
    }).join('');

    // Labels separados abaixo das barras
    const labelsEl = document.createElement('div');
    labelsEl.className = 'timeline-labels';
    labelsEl.innerHTML = years.map(y => `<div class="timeline-year">${y}</div>`).join('');
    bars.insertAdjacentElement('afterend', labelsEl);
  }

  async function loadSelo(selo, idx, grid) {
    try {
      const hoje      = new Date().toISOString().slice(0,10);
      const seisAtras = new Date(); seisAtras.setMonth(seisAtras.getMonth() - 6);
      const seisAtrasStr = seisAtras.toISOString().slice(0,10);

      const [livrosRes, recentRes, lancRes, prevRes, catRes] = await Promise.all([
        fetch(
          `${API}/items/biblioteca?limit=12&fields=id,capa_url,titulo,autor,data_publicacao` +
          `&${fq({ _and: [{ editora: { _eq: selo.nome_display } }, { capa_url: { _nnull: true } }] })}&sort=-data_publicacao`
        ),
        fetch(
          `${API}/items/biblioteca?limit=1&fields=titulo,autor,data_publicacao` +
          `&${fq({ editora: { _eq: selo.nome_display } })}&sort=-data_publicacao`
        ),
        fetch(
          `${API}/items/biblioteca?limit=0&meta=filter_count` +
          `&${fq({ _and: [{ editora: { _eq: selo.nome_display } }, { data_publicacao: { _gte: seisAtrasStr, _lte: hoje } }] })}`
        ),
        fetch(
          `${API}/items/biblioteca?limit=0&meta=filter_count` +
          `&${fq({ _and: [{ editora: { _eq: selo.nome_display } }, { data_publicacao: { _gt: hoje } }] })}`
        ),
        fetch(
          `${API}/items/biblioteca?limit=0&meta=filter_count` +
          `&${fq({ editora: { _eq: selo.nome_display } })}`
        )
      ]);

      const livros   = (await livrosRes.json()).data || [];
      const recente  = ((await recentRes.json()).data || [])[0];
      const nLanc    = (await lancRes.json()).meta?.filter_count || 0;
      const nPrev    = (await prevRes.json()).meta?.filter_count || 0;
      const nCatalog = (await catRes.json()).meta?.filter_count || 0;

      const info     = SELO_INFO[selo.nome_display] || {};
      const hits     = HITS[selo.nome_display] || [];
      const logoUrl  = SELO_LOGOS[selo.nome_display] || null;
      const igHandle = SELO_INSTAGRAM[selo.nome_display] || null;

      const tagHtml = info.tag
        ? `<div class="selo-tag">${esc(info.tag)}</div>`
        : '';

      const descHtml = info.desc
        ? `<div class="selo-desc">${esc(info.desc)}</div>`
        : '';

      const coversHtml = livros.length
        ? livros.map(b =>
            `<div class="mini-cover" onclick="openBookModal(${b.id},'${esc(selo.nome_display)}')"
                  title="${esc(b.titulo)}${b.autor ? ' · ' + esc(b.autor) : ''}">
              ${b.capa_url
                ? `<img src="${esc(b.capa_url)}" alt="${esc(b.titulo)}"
                       onload="this.classList.add('loaded')"
                       onerror="this.parentElement.innerHTML='<div class=mini-cover-placeholder>·</div>'">`
                : '<div class="mini-cover-placeholder">·</div>'
              }
            </div>`
          ).join('')
        : '<div style="color:var(--muted);font-size:.8rem;font-style:italic">sem capas disponíveis</div>';

      const hitsHtml = hits.length
        ? `<div class="selo-hits">
            <div class="selo-hits-label">títulos de referência</div>
            ${hits.map(h => {
              const titleQ = h.split(' — ')[0].trim();
              return `<div class="hit-row"
                data-title="${esc(titleQ)}" data-selo="${esc(selo.nome_display)}"
                onmouseenter="hitEnter(event)" onmouseleave="hitLeave()">· ${esc(h)}</div>`;
            }).join('')}
           </div>`
        : '';

      const recenteHtml = recente
        ? `<div class="selo-recent">
            mais recente: <strong>${esc(recente.titulo)}</strong>
            ${recente.autor ? ` · ${esc(recente.autor)}` : ''}
            ${recente.data_publicacao ? ` · ${new Date(recente.data_publicacao + 'T12:00:00').toLocaleDateString('pt-BR', {month:'short', year:'numeric'})}` : ''}
           </div>`
        : '';

      const logoHtml = logoUrl
        ? `<img class="selo-logo" src="${esc(logoUrl)}" alt="${esc(selo.nome_display)}"
               onerror="this.style.display='none'">`
        : '';

      const igStats = igHandle ? (SELO_IG_STATS[igHandle] || null) : null;
      const igSvg = `<svg class="ig-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>`;
      const igHtml = igHandle
        ? `<div class="ig-block">
            ${igSvg}
            <div class="ig-body">
              <a class="ig-handle-link" href="https://instagram.com/${esc(igHandle)}" target="_blank" rel="noopener">@${esc(igHandle)}</a>
              ${igStats ? `<div class="ig-stats">
                <span class="ig-stat"><strong>${esc(igStats.seg)}</strong> seguidores</span>
                <span class="ig-stat-sep">·</span>
                <span class="ig-stat"><strong>${esc(igStats.posts)}</strong> posts</span>
              </div>
              ${igStats.bio ? `<div class="ig-bio">"${esc(igStats.bio)}"</div>` : ''}` : ''}
            </div>
           </div>`
        : `<div class="ig-block ig-block-vazio">
            ${igSvg}
            <div class="ig-body">
              <span class="ig-sem-conta">sem instagram próprio</span>
              <div class="ig-stats" style="margin-top:4px">
                <span class="ig-stat">comunicação via <a class="ig-handle-link" href="https://instagram.com/editorarecord" target="_blank" rel="noopener" style="font-size:0.72rem;font-weight:normal">@editorarecord</a></span>
              </div>
            </div>
           </div>`;

      const statsHtml = `
        <div class="selo-stats">
          <div class="selo-stat"><strong>${fmt(nCatalog)}</strong> em catálogo</div>
          <div class="selo-stat"><strong>${fmt(nLanc)}</strong> últimos 6 meses</div>
          <div class="selo-stat accent"><strong>${fmt(nPrev)}</strong> em pré-venda</div>
        </div>`;

      const ativoFlag = nLanc > 0 || nPrev > 0;
      grid.children[idx].outerHTML = `
        <div class="selo-card" data-lanc="${nLanc}" data-prev="${nPrev}">
          ${ativoFlag ? '' : '<span class="tag-inativo">sem lançamentos</span>'}
          ${logoHtml}
          <div class="selo-header">
            <div>
              <div class="selo-nome">${esc(selo.nome_display)}</div>
              ${tagHtml}
            </div>
            ${statsHtml}
          </div>
          ${igHtml}
          ${descHtml}
          <div class="selo-covers">${coversHtml}</div>
          ${hitsHtml}
          ${recenteHtml}
        </div>
      `;
    } catch(e) {
      grid.children[idx].innerHTML =
        `<div style="color:var(--muted);font-size:.8rem">${esc(selo.nome_display)} · erro ao carregar</div>`;
    }
  }

  // ── Hover nos hits ────────────────────────────────────────────────────────
  const _hitCache = {};
  let _hitTimer   = null;

  function hitEnter(e) {
    clearTimeout(_hitTimer);
    const el    = e.currentTarget;
    const title = el.dataset.title;
    const selo  = el.dataset.selo;
    _hitTimer = setTimeout(() => _showHitTooltip(el, title, selo), 250);
  }

  function hitLeave() {
    clearTimeout(_hitTimer);
    document.getElementById('hit-tooltip').classList.remove('visible');
  }

  async function _showHitTooltip(el, titleQ, seloNome) {
    const key = seloNome + '|' + titleQ;
    if (!(key in _hitCache)) {
      try {
        const r = await fetch(
          `${API}/items/biblioteca?limit=1&fields=titulo,autor,capa_url,data_publicacao` +
          `&${fq({ _and: [{ editora: { _eq: seloNome } }, { titulo: { _icontains: titleQ } }] })}`
        );
        _hitCache[key] = ((await r.json()).data || [])[0] || null;
      } catch { _hitCache[key] = null; }
    }
    const b = _hitCache[key];
    if (!b) return;

    const tt = document.getElementById('hit-tooltip');
    document.getElementById('hit-tooltip-img').src    = b.capa_url || '';
    document.getElementById('hit-tooltip-title').textContent  = b.titulo || '';
    document.getElementById('hit-tooltip-author').textContent = b.autor  || '';
    document.getElementById('hit-tooltip-date').textContent   = b.data_publicacao
      ? new Date(b.data_publicacao + 'T12:00:00').toLocaleDateString('pt-BR', {month:'long', year:'numeric'})
      : '';

    const rect = el.getBoundingClientRect();
    const tipW  = 240;
    const leftOk = rect.right + 12 + tipW < window.innerWidth;
    tt.style.top  = `${Math.max(8, rect.top - 10)}px`;
    tt.style.left = leftOk ? `${rect.right + 12}px` : `${rect.left - tipW - 12}px`;
    tt.classList.add('visible');
  }

  // ── Modal de detalhe ───────────────────────────────────────────────────────
  async function openBookModal(id, seloNome) {
    const overlay = document.getElementById('book-overlay');
    const inner   = document.getElementById('book-modal-inner');
    inner.innerHTML = '<div class="book-modal-loading">carregando…</div>';
    overlay.classList.add('open');

    try {
      const r = await fetch(`${API}/items/biblioteca/${id}?fields=titulo,autor,editora,capa_url,data_publicacao,isbn,sinopse`);
      const b = (await r.json()).data || {};
      const dateStr = b.data_publicacao
        ? new Date(b.data_publicacao + 'T12:00:00').toLocaleDateString('pt-BR', {day:'2-digit', month:'long', year:'numeric'})
        : '';

      inner.innerHTML = `
        <div class="book-modal-cover">
          ${b.capa_url
            ? `<img src="${esc(b.capa_url)}" alt="${esc(b.titulo)}">`
            : '<div class="book-modal-cover-placeholder">·</div>'
          }
        </div>
        <div class="book-modal-info">
          <div class="book-modal-selo">${esc(seloNome)}</div>
          <div class="book-modal-title">${esc(b.titulo || '')}</div>
          <div class="book-modal-author">${esc(b.autor || '')}</div>
          <div class="book-modal-meta">
            ${dateStr ? `<span class="book-modal-tag">${esc(dateStr)}</span>` : ''}
            ${b.isbn  ? `<span class="book-modal-tag">ISBN ${esc(b.isbn)}</span>` : ''}
          </div>
          ${b.sinopse
            ? `<div class="book-modal-sinopse">${b.sinopse.split('\n').filter(Boolean).slice(0,4).map(p => `<p>${esc(p)}</p>`).join('')}</div>`
            : '<div class="book-modal-sinopse">sinopse não disponível</div>'
          }
        </div>
      `;
    } catch(e) {
      inner.innerHTML = '<div class="book-modal-loading">erro ao carregar</div>';
    }
  }

  function closeBookModal() {
    document.getElementById('book-overlay').classList.remove('open');
  }

  document.getElementById('book-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('book-overlay')) closeBookModal();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeBookModal();
  });

  main();
</script>
</body>
</html>
