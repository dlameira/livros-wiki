<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #161616;
      --border: #242424;
      --text: #e0d8ce;
      --muted: #666;
      --accent: #c9a84c;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 32px 48px 0;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.06em;
      color: #f0e8dc;
      margin-bottom: 6px;
    }

    header p {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .status {
      padding: 16px 48px 0;
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 28px 20px;
      padding: 24px 48px 80px;
      align-items: start;
    }

    .book-card {
      cursor: pointer;
      transition: transform 0.15s;
    }

    .book-card:hover { transform: translateY(-4px); }
    .book-card:hover .card-title { color: var(--accent); }

    .cover-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 2/3;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 9px;
    }

    .cover-wrap img {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: auto;
      display: block;
      opacity: 0;
      transition: opacity 0.35s;
    }

    .cover-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 2rem;
    }

    .card-title {
      font-size: 0.82rem;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color 0.15s;
    }

    .card-author {
      font-size: 0.73rem;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .empty {
      grid-column: 1/-1;
      text-align: center;
      color: #333;
      padding: 80px 0;
      font-size: 0.9rem;
    }

    /* ── DETALHE ── */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 40px 20px;
    }

    .detail-overlay.open { display: flex; }

    .detail-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 680px;
      max-width: 100%;
      padding: 0;
      overflow: hidden;
      position: relative;
    }

    .detail-back {
      position: absolute;
      top: 16px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      border: 1px solid #333;
      color: #aaa;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      z-index: 10;
      transition: background 0.15s;
    }
    .detail-back:hover { background: rgba(0,0,0,0.8); color: #fff; }

    .detail-hero {
      display: flex;
      gap: 0;
      min-height: 280px;
    }

    .detail-cover {
      width: 180px;
      flex-shrink: 0;
      background: #111;
    }

    .detail-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .detail-cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2a2a2a;
      font-size: 3rem;
    }

    .detail-header {
      flex: 1;
      padding: 48px 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: linear-gradient(to bottom, #111 0%, var(--surface) 100%);
    }

    .detail-publisher-badge {
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .detail-title {
      font-size: 1.4rem;
      font-weight: normal;
      line-height: 1.3;
      color: #f0e8dc;
      margin-bottom: 6px;
    }

    .detail-author {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 12px;
    }

    .detail-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .detail-tag {
      font-size: 0.72rem;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: #666;
    }

    .detail-body {
      padding: 24px 28px 32px;
    }

    .detail-sinopse {
      font-size: 0.88rem;
      line-height: 1.7;
      color: #aaa;
    }

    .detail-sinopse p { margin-bottom: 12px; }
    .detail-sinopse p:last-child { margin-bottom: 0; }

    /* ── FILTROS ── */
    .filters-row {
      padding: 16px 48px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* Pills de preset */
    .pill {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 0.78rem;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
      font-family: inherit;
    }
    .pill:hover { border-color: #444; color: #aaa; }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #0f0f0f; }

    /* Seletores de data */
    .filter-label {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .date-sel {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.78rem;
      font-family: inherit;
      padding: 4px 6px;
      border-radius: 6px;
      cursor: pointer;
      outline: none;
    }
    .date-sel:focus { border-color: #444; }
    .date-sep { color: var(--muted); font-size: 0.78rem; margin: 0 4px; }

    /* Busca de editora */
    .pub-search-wrap { position: relative; }
    .pub-input {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.78rem;
      font-family: inherit;
      padding: 5px 13px;
      border-radius: 20px;
      outline: none;
      width: 150px;
      transition: border-color 0.15s;
    }
    .pub-input::placeholder { color: var(--muted); }
    .pub-input:focus { border-color: #444; }

    .pub-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: var(--surface);
      border: 1px solid #333;
      border-radius: 8px;
      min-width: 220px;
      max-height: 260px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .pub-dropdown.open { display: block; }
    .pub-option {
      padding: 8px 14px;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.1s;
    }
    .pub-option:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .pub-option.selected { color: var(--text); }
    .pub-option.selected::before { content: '✓ '; color: var(--accent); }
    .pub-empty { cursor: default; color: #444; }
    .pub-empty:hover { background: transparent; }

    /* Tags de grupos selecionados */
    .grupo-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px 4px 12px;
      border-radius: 20px;
      border: 1px solid;
      font-size: 0.75rem;
      color: #fff;
    }
    .grupo-tag-remove {
      cursor: pointer;
      opacity: .7;
      font-size: 1rem;
      line-height: 1;
      transition: opacity 0.15s;
    }
    .grupo-tag-remove:hover { opacity: 1; }

    /* Tags de editoras selecionadas */
    .pub-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px 4px 12px;
      border-radius: 20px;
      border: 1px solid #3a3a3a;
      background: #1e1e1e;
      font-size: 0.75rem;
      color: var(--text);
    }
    .pub-tag-remove {
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1;
      transition: color 0.15s;
    }
    .pub-tag-remove:hover { color: var(--text); }

    .detail-contributors {
      font-size: 0.78rem;
      color: #666;
      margin-bottom: 20px;
    }
    .contrib-role { color: #555; }

    .detail-bio {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      line-height: 1.7;
      color: #888;
    }
    .detail-bio-label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<header>
  <h1>biblioteca</h1>
  <p>livros das editoras selecionadas</p>
</header>

<div class="filters-row" id="filters-category">
  <button class="pill" onclick="setPreset('prevenda',this)">pré-venda</button>
  <button class="pill active" onclick="setPreset('lancamentos',this)">lançamentos</button>
  <button class="pill" onclick="setPreset('tudo',this)">tudo</button>
</div>
<div class="filters-row" id="filters-date">
  <span class="filter-label">de</span>
  <select class="date-sel" id="from-month" onchange="onDateChange()"></select>
  <select class="date-sel" id="from-year" onchange="onDateChange()"></select>
  <span class="filter-label">até</span>
  <select class="date-sel" id="to-month" onchange="onDateChange()"></select>
  <select class="date-sel" id="to-year" onchange="onDateChange()"></select>
</div>
<div class="filters-row" id="filters-grupo">
  <div class="pub-search-wrap" id="grupo-search-wrap">
    <input class="pub-input" id="grupo-input" type="text" placeholder="grupo editorial…"
      oninput="onGrupoInput(this.value)" onfocus="openGrupoDropdown()" autocomplete="off">
    <div class="pub-dropdown" id="grupo-dropdown"></div>
  </div>
  <div id="grupo-tags"></div>
</div>
<div class="filters-row" id="filters-pub">
  <div class="pub-search-wrap" id="pub-search-wrap">
    <input class="pub-input" id="pub-input" type="text" placeholder="editora…"
      oninput="onPubInput(this.value)" onfocus="openPubDropdown()" autocomplete="off">
    <div class="pub-dropdown" id="pub-dropdown"></div>
  </div>
  <div id="pub-tags"></div>
</div>

<div class="status" id="status"></div>

<div class="grid" id="grid"></div>

<!-- Detalhe -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel" id="detail-panel">
    <button class="detail-back" onclick="closeDetail()">← voltar</button>
    <div class="detail-hero">
      <div class="detail-cover" id="detail-cover"></div>
      <div class="detail-header" id="detail-header"></div>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
  const DIRECTUS_URL   = 'https://directus-production-afdd.up.railway.app';

  let allBooks    = [];
  let allEditoras = [];
  let allGrupos   = []; // [{nome, cor, editoras:[]}]
  let selectedEditoras = new Set();
  let selectedGrupos   = new Set(); // nomes dos grupos selecionados
  let currentPreset = 'lancamentos';
  let dateFrom = null;
  let dateTo   = null;

  const MONTHS_PT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

  // ── Datas ──────────────────────────────────────────────────────────────────

  function buildDateSelects() {
    const year = new Date().getFullYear();
    ['from-month','to-month'].forEach(id => {
      const sel = document.getElementById(id);
      MONTHS_PT.forEach((m, i) => {
        const o = document.createElement('option');
        o.value = i; o.textContent = m; sel.appendChild(o);
      });
    });
    ['from-year','to-year'].forEach(id => {
      const sel = document.getElementById(id);
      for (let y = 1980; y <= year + 2; y++) {
        const o = document.createElement('option');
        o.value = y; o.textContent = y; sel.appendChild(o);
      }
    });
  }

  function setDateSelects(from, to) {
    const fromMonth = document.getElementById('from-month');
    const fromYear  = document.getElementById('from-year');
    const toMonth   = document.getElementById('to-month');
    const toYear    = document.getElementById('to-year');
    if (from) {
      fromMonth.value = from.getMonth();
      fromYear.value  = from.getFullYear();
    } else {
      fromMonth.value = 0;
      fromYear.value  = fromYear.options[0].value; // primeiro ano disponível
    }
    if (to) {
      toMonth.value = to.getMonth();
      toYear.value  = to.getFullYear();
    } else {
      toMonth.value = 11;
      toYear.value  = toYear.options[toYear.options.length - 1].value; // último ano
    }
  }

  function setPreset(name, btn) {
    currentPreset = name;
    const today = new Date();
    if (name === 'prevenda') {
      const from = new Date(today); from.setDate(today.getDate() + 1);
      const to   = new Date(today); to.setMonth(today.getMonth() + 18);
      dateFrom = from; dateTo = to;
    } else if (name === 'lancamentos') {
      const from = new Date(today); from.setMonth(today.getMonth() - 4); from.setDate(1);
      dateFrom = from; dateTo = new Date(today);
    } else {
      const to = new Date(today); to.setMonth(today.getMonth() + 18);
      dateFrom = new Date(1980, 0, 1); dateTo = to;
    }
    setDateSelects(dateFrom, dateTo);
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    if (btn) btn.classList.add('active');
    fetchBooks();
  }

  function onDateChange() {
    currentPreset = null;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    const fm = +document.getElementById('from-month').value;
    const fy = +document.getElementById('from-year').value;
    const tm = +document.getElementById('to-month').value;
    const ty = +document.getElementById('to-year').value;
    dateFrom = new Date(fy, fm, 1);
    dateTo   = new Date(ty, tm + 1, 0);
    fetchBooks();
  }

  // ── Grupos editoriais ──────────────────────────────────────────────────────

  async function loadGrupos() {
    try {
      const r = await fetch(
        `${DIRECTUS_URL}/items/selos?fields=nome_display,grupo.nome,grupo.cor&limit=200&filter[ativo][_eq]=true`
      );
      const j = await r.json();
      const map = {};
      for (const s of (j.data || [])) {
        if (!s.grupo || s.grupo.nome === 'Independente') continue;
        const nome = s.grupo.nome;
        if (!map[nome]) map[nome] = { nome, cor: s.grupo.cor || '#888', editoras: [] };
        map[nome].editoras.push(s.nome_display);
      }
      allGrupos = Object.values(map).sort((a,b) => a.nome.localeCompare(b.nome));
    } catch(e) {}
  }

  function onGrupoInput(query) { openGrupoDropdown(query); }

  function openGrupoDropdown(query) {
    const q = query !== undefined ? query : document.getElementById('grupo-input').value;
    const filtered = allGrupos.filter(g => !q || g.nome.toLowerCase().includes(q.toLowerCase()));
    const dd = document.getElementById('grupo-dropdown');
    dd.innerHTML = filtered.length
      ? filtered.map(g => {
          const sel = selectedGrupos.has(g.nome);
          return `<div class="pub-option${sel?' selected':''}" data-grupo="${escHtml(g.nome)}"
                    style="${sel?`color:${g.cor}`:''}">
                    ${escHtml(g.nome)}
                  </div>`;
        }).join('')
      : '<div class="pub-option pub-empty">nenhum encontrado</div>';
    dd.classList.add('open');
  }

  function closeGrupoDropdown() {
    document.getElementById('grupo-dropdown').classList.remove('open');
    document.getElementById('grupo-input').value = '';
  }

  function toggleGrupo(nome) {
    if (selectedGrupos.has(nome)) selectedGrupos.delete(nome);
    else selectedGrupos.add(nome);
    openGrupoDropdown();
    renderGrupoTags();
    renderGrid();
  }

  function renderGrupoTags() {
    document.getElementById('grupo-tags').innerHTML = [...selectedGrupos].map(nome => {
      const g = allGrupos.find(g => g.nome === nome);
      const cor = g?.cor || '#888';
      return `<span class="grupo-tag" style="background:${cor};border-color:${cor}"
                data-grupo="${escHtml(nome)}">${escHtml(nome)
              }<span class="grupo-tag-remove" data-grupo="${escHtml(nome)}">×</span></span>`;
    }).join('');
  }

  document.getElementById('grupo-dropdown').addEventListener('click', e => {
    const opt = e.target.closest('.pub-option');
    if (opt && opt.dataset.grupo) toggleGrupo(opt.dataset.grupo);
  });
  document.getElementById('grupo-tags').addEventListener('click', e => {
    const rem = e.target.closest('.grupo-tag-remove');
    if (rem) toggleGrupo(rem.dataset.grupo);
  });
  document.addEventListener('click', e => {
    if (!document.getElementById('grupo-search-wrap').contains(e.target)) closeGrupoDropdown();
  });

  // ── Editoras ───────────────────────────────────────────────────────────────

  function buildPublisherList() {
    allEditoras = [...new Set(allBooks.map(b => b.editora).filter(Boolean))].sort();
  }

  function onPubInput(query) { openPubDropdown(query); }

  function openPubDropdown(query) {
    const q = query !== undefined ? query : document.getElementById('pub-input').value;
    const filtered = allEditoras.filter(e => !q || e.toLowerCase().includes(q.toLowerCase()));
    const dd = document.getElementById('pub-dropdown');
    dd.innerHTML = filtered.length
      ? filtered.map(e =>
          `<div class="pub-option${selectedEditoras.has(e) ? ' selected' : ''}" data-pub="${escHtml(e)}">${escHtml(e)}</div>`
        ).join('')
      : '<div class="pub-option pub-empty">nenhuma encontrada</div>';
    dd.classList.add('open');
  }

  function closePubDropdown() {
    document.getElementById('pub-dropdown').classList.remove('open');
    document.getElementById('pub-input').value = '';
  }

  function toggleEditora(name) {
    if (selectedEditoras.has(name)) selectedEditoras.delete(name);
    else selectedEditoras.add(name);
    openPubDropdown();
    renderPublisherTags();
    renderGrid();
  }

  function renderPublisherTags() {
    document.getElementById('pub-tags').innerHTML = [...selectedEditoras].map(e =>
      `<span class="pub-tag">${escHtml(e)}<span class="pub-tag-remove" data-pub="${escHtml(e)}">×</span></span>`
    ).join('');
  }

  document.getElementById('pub-dropdown').addEventListener('click', e => {
    const opt = e.target.closest('.pub-option');
    if (opt && opt.dataset.pub) toggleEditora(opt.dataset.pub);
  });
  document.getElementById('pub-tags').addEventListener('click', e => {
    const rem = e.target.closest('.pub-tag-remove');
    if (rem) toggleEditora(rem.dataset.pub);
  });
  document.addEventListener('click', e => {
    if (!document.getElementById('pub-search-wrap').contains(e.target)) closePubDropdown();
  });

  // ── Filter + fetch ─────────────────────────────────────────────────────────

  function filterBooks() {
    let books = allBooks;
    const grupoEditoras = new Set(
      allGrupos.filter(g => selectedGrupos.has(g.nome)).flatMap(g => g.editoras)
    );
    if (selectedEditoras.size > 0 || grupoEditoras.size > 0)
      books = books.filter(b => selectedEditoras.has(b.editora) || grupoEditoras.has(b.editora));
    return books;
  }

  async function fetchBooks() {
    setStatus('carregando...');
    try {
      let url = `${DIRECTUS_URL}/items/biblioteca?sort=-data_publicacao&fields=id,isbn,titulo,autor,editora,capa_url,data_publicacao`;
      if (dateFrom) url += `&filter[data_publicacao][_gte]=${dateFrom.toISOString().slice(0, 10)}`;
      if (dateTo)   url += `&filter[data_publicacao][_lte]=${dateTo.toISOString().slice(0, 10)}`;
      const rangeDays = (dateTo && dateFrom) ? (dateTo - dateFrom) / 86400000 : 99999;
      url += (rangeDays > 365) ? '&limit=5000' : '&limit=-1';
      const r = await fetch(url);
      const j = await r.json();
      const raw = j.data || [];
      const seen = new Set();
      allBooks = raw.filter(b => {
        const key = (b.titulo || '').toLowerCase().trim();
        if (seen.has(key)) return false;
        seen.add(key); return true;
      });
      buildPublisherList();
      renderGrid();
    } catch(e) {
      setStatus('erro ao carregar');
    }
  }

  async function init() {
    buildDateSelects();
    loadGrupos();
    setPreset('lancamentos', document.querySelector('.pill.active'));
  }

  function onCoverLoad(img) {
    img.style.opacity = '1';
  }

  let _lazyObserver;
  function setupLazyLoad() {
    if (_lazyObserver) _lazyObserver.disconnect();
    _lazyObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const img = entry.target;
        const src = img.dataset.src;
        if (src) { img.src = src; img.removeAttribute('data-src'); }
        _lazyObserver.unobserve(img);
      });
    }, { rootMargin: '400px 0px' });
    document.querySelectorAll('#grid img[data-src]').forEach(img => _lazyObserver.observe(img));
  }

  function renderGrid() {
    const books = filterBooks();
    const grid = document.getElementById('grid');
    setStatus(`${books.length} livro${books.length !== 1 ? 's' : ''}`);
    if (!books.length) {
      grid.innerHTML = '<div class="empty">nenhum livro encontrado</div>';
      return;
    }
    grid.innerHTML = books.map((b) => `
      <div class="book-card" onclick="openDetail(${b.id})">
        <div class="cover-wrap">
          ${b.capa_url
            ? `<img data-src="${escHtml(b.capa_url)}" alt="${escHtml(b.titulo)}" onerror="this.parentElement.innerHTML='<div class=cover-placeholder>📖</div>'" onload="onCoverLoad(this)">`
            : '<div class="cover-placeholder">📖</div>'
          }
        </div>
        <div class="card-title">${escHtml(b.titulo)}</div>
        <div class="card-author">${escHtml(b.autor)}</div>
      </div>
    `).join('');
    setupLazyLoad();
  }

  async function openDetail(id) {
    const b = allBooks.find(x => x.id === id);
    if (!b) return;

    document.getElementById('detail-cover').innerHTML = b.capa_url
      ? `<img src="${escHtml(b.capa_url)}" alt="${escHtml(b.titulo)}" onerror="this.parentElement.innerHTML='<div class=detail-cover-placeholder></div>'">`
      : '<div class="detail-cover-placeholder"></div>';

    document.getElementById('detail-header').innerHTML = `
      <div class="detail-publisher-badge">${escHtml(b.editora)}</div>
      <div class="detail-title">${escHtml(b.titulo)}</div>
      <div class="detail-author">${escHtml(b.autor)}</div>
      <div class="detail-tags">
        ${b.data_publicacao ? `<span class="detail-tag">${formatDate(b.data_publicacao)}</span>` : ''}
        ${b.isbn ? `<span class="detail-tag">ISBN ${escHtml(b.isbn)}</span>` : ''}
      </div>
    `;

    document.getElementById('detail-body').innerHTML =
      '<div class="detail-sinopse" style="color:#444">carregando...</div>';
    document.getElementById('detail-overlay').classList.add('open');
    window.scrollTo(0, 0);

    try {
      const r = await fetch(
        `${DIRECTUS_URL}/items/biblioteca/${id}?fields=sinopse,biografia_autor,contributors`
      );
      const j = await r.json();
      const d = j.data || {};
      const contribs = formatContributors(d.contributors);
      document.getElementById('detail-body').innerHTML = `
        ${contribs ? `<div class="detail-contributors">${contribs}</div>` : ''}
        ${d.sinopse
          ? `<div class="detail-sinopse">${d.sinopse.split('\n').filter(Boolean).map(p => `<p>${escHtml(p)}</p>`).join('')}</div>`
          : '<div class="detail-sinopse" style="color:#444">sinopse não disponível</div>'
        }
        ${d.biografia_autor ? `<div class="detail-bio"><span class="detail-bio-label">sobre o autor</span>${escHtml(d.biografia_autor)}</div>` : ''}
      `;
    } catch(e) {
      document.getElementById('detail-body').innerHTML =
        '<div class="detail-sinopse" style="color:#444">sinopse não disponível</div>';
    }
  }

  function closeDetail() {
    document.getElementById('detail-overlay').classList.remove('open');
  }

  document.getElementById('detail-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('detail-overlay')) closeDetail();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetail();
  });

  function formatDate(s) {
    if (!s) return '';
    return new Intl.DateTimeFormat('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' })
      .format(new Date(s + 'T12:00:00'));
  }

  const CONTRIBUTOR_TYPES = {
    A01: 'autor', A12: 'ilustrador', A38: 'ilustrador', B06: 'tradução',
    B01: 'edição', A36: 'direção de arte', A11: 'fotografias', A09: 'introdução',
  };

  function formatContributors(contributors) {
    if (!contributors || !contributors.length) return '';
    const groups = {};
    for (const c of contributors) {
      const role = CONTRIBUTOR_TYPES[c.type] || null;
      if (!role) continue;
      const name = c.groupName || [c.firstName, c.lastName].filter(Boolean).join(' ');
      if (!name) continue;
      if (!groups[role]) groups[role] = [];
      groups[role].push(escHtml(name));
    }
    return Object.entries(groups)
      .map(([role, names]) => `<span class="contrib-role">${role}:</span> ${names.join(', ')}`)
      .join(' &nbsp;·&nbsp; ');
  }

  function escHtml(s = '') {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  init();
</script>
</body>
</html>
