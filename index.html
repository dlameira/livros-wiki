<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>livros.wiki</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #161616;
      --border: #242424;
      --text: #e0d8ce;
      --muted: #666;
      --accent: #c9a84c;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 32px 48px 0;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .header-left h1 {
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.06em;
      color: #f0e8dc;
      margin-bottom: 6px;
    }

    .header-left h1 span { color: var(--accent); }

    .header-left p {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .save-view-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      font-family: inherit;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .save-view-btn:hover { border-color: #444; color: #aaa; }
    .save-view-btn.saved { border-color: var(--accent); color: var(--accent); }

    .status {
      padding: 16px 48px 0;
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 28px 20px;
      padding: 24px 48px 40px;
      align-items: start;
    }

    .book-card {
      cursor: pointer;
      transition: transform 0.15s;
    }

    .book-card:hover { transform: translateY(-4px); }
    .book-card:hover .card-title { color: var(--accent); }

    .cover-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 2/3;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 9px;
    }

    .cover-wrap img {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: auto;
      display: block;
      opacity: 0;
      transition: opacity 0.35s;
    }

    .cover-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 2rem;
    }

    .card-title {
      font-size: 0.82rem;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color 0.15s;
    }

    .card-author {
      font-size: 0.73rem;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .empty {
      grid-column: 1/-1;
      text-align: center;
      color: #333;
      padding: 80px 0;
      font-size: 0.9rem;
    }

    #scroll-sentinel {
      height: 80px;
      margin: 0 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-more {
      font-size: 0.78rem;
      color: #333;
    }

    /* ── DETALHE ── */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 40px 20px;
    }

    .detail-overlay.open { display: flex; }

    .detail-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 680px;
      max-width: 100%;
      padding: 0;
      overflow: hidden;
      position: relative;
    }

    .detail-back {
      position: absolute;
      top: 16px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      border: 1px solid #333;
      color: #aaa;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      z-index: 10;
      transition: background 0.15s;
    }
    .detail-back:hover { background: rgba(0,0,0,0.8); color: #fff; }

    .detail-hero {
      display: flex;
      gap: 0;
      min-height: 280px;
    }

    .detail-cover {
      width: 180px;
      flex-shrink: 0;
      background: #111;
    }

    .detail-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .detail-cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2a2a2a;
      font-size: 3rem;
    }

    .detail-header {
      flex: 1;
      padding: 48px 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: linear-gradient(to bottom, #111 0%, var(--surface) 100%);
    }

    .detail-publisher-badge {
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .detail-title {
      font-size: 1.4rem;
      font-weight: normal;
      line-height: 1.3;
      color: #f0e8dc;
      margin-bottom: 6px;
    }

    .detail-author {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 12px;
    }

    .detail-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .detail-tag {
      font-size: 0.72rem;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: #666;
    }

    .detail-body {
      padding: 24px 28px 32px;
    }

    .detail-sinopse {
      font-size: 0.88rem;
      line-height: 1.7;
      color: #aaa;
    }

    .detail-sinopse p { margin-bottom: 12px; }
    .detail-sinopse p:last-child { margin-bottom: 0; }

    /* ── FILTROS ── */
    .filters-row {
      padding: 16px 48px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 0.78rem;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
      font-family: inherit;
    }
    .pill:hover { border-color: #444; color: #aaa; }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #0f0f0f; }

    .filter-label {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .date-sel {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.78rem;
      font-family: inherit;
      padding: 4px 6px;
      border-radius: 6px;
      cursor: pointer;
      outline: none;
    }
    .date-sel:focus { border-color: #444; }
    .date-sep { color: var(--muted); font-size: 0.78rem; margin: 0 4px; }

    .pub-search-wrap { position: relative; }
    .pub-input {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.78rem;
      font-family: inherit;
      padding: 5px 13px;
      border-radius: 20px;
      outline: none;
      width: 150px;
      transition: border-color 0.15s;
    }
    .pub-input::placeholder { color: var(--muted); }
    .pub-input:focus { border-color: #444; }

    .pub-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: var(--surface);
      border: 1px solid #333;
      border-radius: 8px;
      min-width: 220px;
      max-height: 260px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .pub-dropdown.open { display: block; }
    .pub-option {
      padding: 8px 14px;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.1s;
    }
    .pub-option:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .pub-option.selected { color: var(--text); }
    .pub-option.selected::before { content: '✓ '; color: var(--accent); }
    .pub-empty { cursor: default; color: #444; }
    .pub-empty:hover { background: transparent; }

    .grupo-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px 4px 12px;
      border-radius: 20px;
      border: 1px solid;
      font-size: 0.75rem;
      color: #fff;
    }
    .grupo-tag-remove {
      cursor: pointer;
      opacity: .7;
      font-size: 1rem;
      line-height: 1;
      transition: opacity 0.15s;
    }
    .grupo-tag-remove:hover { opacity: 1; }

    .pub-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px 4px 12px;
      border-radius: 20px;
      border: 1px solid #3a3a3a;
      background: #1e1e1e;
      font-size: 0.75rem;
      color: var(--text);
    }
    .editoras-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px 4px 12px;
      border-radius: 20px;
      border: 1px solid #3a3a3a;
      background: #1e1e1e;
      font-size: 0.75rem;
      color: var(--text);
    }
    .editoras-tag-remove {
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1;
      transition: color 0.15s;
    }
    .editoras-tag-remove:hover { color: var(--text); }

    .editoras-add-btn {
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      font-family: inherit;
      padding: 4px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .editoras-add-btn:hover { border-color: #444; color: #aaa; }

    .detail-contributors {
      font-size: 0.78rem;
      color: #666;
      margin-bottom: 20px;
    }
    .contrib-role { color: #555; }

    .detail-bio {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      line-height: 1.7;
      color: #888;
    }
    .detail-bio-label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 8px;
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      header { padding: 20px 16px 0; flex-wrap: wrap; gap: 10px; }
      .filters-row { padding: 10px 16px 0; }
      .status { padding: 10px 16px 0; }
      .grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 16px 10px;
        padding: 16px 16px 60px;
      }
      .card-author { display: none; }
      #scroll-sentinel { margin: 0 16px; }
    }

    /* ── PAINEL EDITORAS VISITANTE ── */
    .ep-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 300;
      justify-content: flex-end;
    }
    .ep-overlay.open { display: flex; }

    .ep-panel {
      width: 440px;
      max-width: 100vw;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    .ep-header {
      padding: 24px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .ep-header h2 { font-size: 1.1rem; font-weight: normal; color: #f0e8dc; }
    .ep-header p  { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }
    .ep-close {
      background: none; border: none; color: var(--muted); font-size: 1.2rem;
      cursor: pointer; padding: 0; line-height: 1; transition: color 0.15s; flex-shrink: 0;
    }
    .ep-close:hover { color: var(--text); }

    .ep-search {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .ep-search input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.82rem;
      font-family: inherit;
      padding: 7px 12px;
      border-radius: 6px;
      outline: none;
    }
    .ep-search input:focus { border-color: #444; }

    .ep-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 16px;
    }

    .ep-section-label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      padding: 12px 20px 6px;
    }

    .ep-group {
      padding: 6px 20px 10px;
      border-bottom: 1px solid #1a1a1a;
    }
    .ep-group-nome {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .ep-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .ep-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
      user-select: none;
    }
    .ep-tag:hover { border-color: #444; color: var(--text); }
    .ep-tag.on { border-color: var(--accent); color: var(--accent); background: rgba(201,168,76,0.08); }
    .ep-tag.on::before { content: '✓ '; font-size: 0.65rem; }

    .ep-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .ep-count { font-size: 0.78rem; color: var(--muted); flex: 1; }
    .ep-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      font-family: inherit;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .ep-btn:hover { border-color: #444; color: var(--text); }
    .ep-btn-save {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f0f0f;
    }
    .ep-btn-save:hover { opacity: 0.85; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>livros<span>.</span>wiki</h1>
    <p>livros sem algoritmos &nbsp;·&nbsp; <span style="color:#444">v 0.01 beta</span></p>
    <p style="font-size:0.68rem;color:#333;margin-top:3px">por daniel lameira + metabooks</p>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="save-view-btn" id="save-view-btn" onclick="toggleSaveView()" style="display:none">salvar vista</button>
  </div>
</header>

<!-- Painel: Editoras -->
<div class="ep-overlay" id="ep-overlay" onclick="if(event.target===this)closeEditorasPanel()">
  <div class="ep-panel">
    <div class="ep-header">
      <div>
        <h2>editoras</h2>
        <p>grupos e editoras para filtrar o catálogo</p>
      </div>
      <button class="ep-close" onclick="closeEditorasPanel()">✕</button>
    </div>
    <div class="ep-search">
      <input type="text" id="ep-search" placeholder="buscar editora ou grupo…" oninput="renderEpBody()">
    </div>
    <div class="ep-body" id="ep-body">
      <div style="padding:40px 20px;color:#333;text-align:center;font-size:.85rem">carregando…</div>
    </div>
    <div class="ep-footer">
      <span class="ep-count" id="ep-count"></span>
      <button class="ep-btn" onclick="epSetDefault()">padrão</button>
      <button class="ep-btn" onclick="epSetNone()">nenhuma</button>
      <button class="ep-btn" onclick="epSetAll()">todas</button>
    </div>
  </div>
</div>

<div class="filters-row" id="filters-category">
  <button class="pill" data-preset="prevenda" onclick="setPreset('prevenda',this)">pré-venda</button>
  <button class="pill active" data-preset="lancamentos" onclick="setPreset('lancamentos',this)">lançamentos</button>
  <button class="pill" data-preset="tudo" onclick="setPreset('tudo',this)">tudo</button>
</div>
<div class="filters-row" id="filters-date">
  <span class="filter-label">de</span>
  <select class="date-sel" id="from-month" onchange="onDateChange()"></select>
  <select class="date-sel" id="from-year" onchange="onDateChange()"></select>
  <span class="filter-label">até</span>
  <select class="date-sel" id="to-month" onchange="onDateChange()"></select>
  <select class="date-sel" id="to-year" onchange="onDateChange()"></select>
</div>
<div class="filters-row" id="filters-editoras">
  <span class="filter-label">editoras</span>
  <div id="editoras-tags"></div>
  <button class="editoras-add-btn" onclick="openEditorasPanel()">+ adicionar</button>
</div>
<div class="filters-row" id="filters-autor">
  <input class="pub-input" id="autor-input" type="text" placeholder="buscar autor…"
    oninput="onAutorInput(this.value)" autocomplete="off" style="width:180px">
  <button class="pill" id="autor-editoras-btn" style="display:none"
    onclick="toggleAutorEditoras()">só minhas editoras ×</button>
</div>

<div class="status" id="status"></div>

<div class="grid" id="grid"></div>
<div id="scroll-sentinel"></div>

<!-- Detalhe -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel" id="detail-panel">
    <button class="detail-back" onclick="closeDetail()">← voltar</button>
    <div class="detail-hero">
      <div class="detail-cover" id="detail-cover"></div>
      <div class="detail-header" id="detail-header"></div>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
  const DIRECTUS_URL = 'https://directus-production-afdd.up.railway.app';
  const PAGE_LIMIT   = 500;
  const STORAGE_KEY  = 'livros_wiki_view';

  // ── State ──────────────────────────────────────────────────────────────────
  let allBooks         = [];
  let seenTitles       = new Set();
  let allEditoras      = [];
  let allGrupos        = [];
  let selectedEditoras = new Set();
  let selectedGrupos   = new Set();
  let currentPreset    = 'lancamentos';
  let dateFrom         = null;
  let dateTo           = null;

  // Pagination
  let currentPage  = 1;
  let totalCount   = null;
  let isFetching   = false;
  let hasMore      = true;

  const MONTHS_PT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

  // ── Scroll infinito ────────────────────────────────────────────────────────

  const scrollObserver = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && !isFetching && hasMore) {
      fetchBooks(false);
    }
  }, { rootMargin: '500px' });

  // ── Datas ──────────────────────────────────────────────────────────────────

  function buildDateSelects() {
    const year = new Date().getFullYear();
    ['from-month','to-month'].forEach(id => {
      const sel = document.getElementById(id);
      MONTHS_PT.forEach((m, i) => {
        const o = document.createElement('option');
        o.value = i; o.textContent = m; sel.appendChild(o);
      });
    });
    ['from-year','to-year'].forEach(id => {
      const sel = document.getElementById(id);
      for (let y = 1980; y <= year + 2; y++) {
        const o = document.createElement('option');
        o.value = y; o.textContent = y; sel.appendChild(o);
      }
    });
  }

  function setDateSelects(from, to) {
    const fromMonth = document.getElementById('from-month');
    const fromYear  = document.getElementById('from-year');
    const toMonth   = document.getElementById('to-month');
    const toYear    = document.getElementById('to-year');
    if (from) {
      fromMonth.value = from.getMonth();
      fromYear.value  = from.getFullYear();
    } else {
      fromMonth.value = 0;
      fromYear.value  = fromYear.options[0].value;
    }
    if (to) {
      toMonth.value = to.getMonth();
      toYear.value  = to.getFullYear();
    } else {
      toMonth.value = 11;
      toYear.value  = toYear.options[toYear.options.length - 1].value;
    }
  }

  function setPreset(name, btn) {
    currentPreset = name;
    const today = new Date();
    if (name === 'prevenda') {
      const from = new Date(today); from.setDate(today.getDate() + 1);
      const to   = new Date(today); to.setMonth(today.getMonth() + 18);
      dateFrom = from; dateTo = to;
    } else if (name === 'lancamentos') {
      const from = new Date(today); from.setMonth(today.getMonth() - 4); from.setDate(1);
      dateFrom = from; dateTo = new Date(today);
    } else {
      const to = new Date(today); to.setMonth(today.getMonth() + 18);
      dateFrom = new Date(1980, 0, 1); dateTo = to;
    }
    setDateSelects(dateFrom, dateTo);
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    if (btn) btn.classList.add('active');
    fetchBooks(true);
  }

  function onDateChange() {
    currentPreset = null;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    const fm = +document.getElementById('from-month').value;
    const fy = +document.getElementById('from-year').value;
    const tm = +document.getElementById('to-month').value;
    const ty = +document.getElementById('to-year').value;
    dateFrom = new Date(fy, fm, 1);
    dateTo   = new Date(ty, tm + 1, 0);
    fetchBooks(true);
  }

  // ── Grupos e editoras ─────────────────────────────────────────────────────

  async function loadGrupos() {
    try {
      const r = await fetch(
        `${DIRECTUS_URL}/items/selos?fields=nome_display,grupo.nome,grupo.cor&limit=200&filter[ativo][_eq]=true`
      );
      const j = await r.json();
      const map = {};
      allEditoras = [];
      for (const s of (j.data || [])) {
        if (s.nome_display) allEditoras.push(s.nome_display);
        if (!s.grupo || s.grupo.nome === 'Independente') continue;
        const nome = s.grupo.nome;
        if (!map[nome]) map[nome] = { nome, cor: s.grupo.cor || '#888', editoras: [] };
        map[nome].editoras.push(s.nome_display);
      }
      allEditoras.sort();
      allGrupos = Object.values(map).sort((a,b) => a.nome.localeCompare(b.nome));
    } catch(e) {}
  }

  // ── Busca por autor ────────────────────────────────────────────────────────

  let authorSearch      = '';
  let authorAllEditoras = false;
  let _autorTimer       = null;

  function onAutorInput(val) {
    clearTimeout(_autorTimer);
    _autorTimer = setTimeout(() => {
      authorSearch = val.trim();
      if (!authorSearch) authorAllEditoras = false;
      updateAutorBtn();
      fetchBooks(true);
    }, 400);
  }

  function toggleAutorEditoras() {
    authorAllEditoras = !authorAllEditoras;
    updateAutorBtn();
    fetchBooks(true);
  }

  function updateAutorBtn() {
    const btn = document.getElementById('autor-editoras-btn');
    if (authorSearch) {
      btn.style.display = '';
      btn.textContent = authorAllEditoras ? 'todas as editoras ×' : 'só minhas editoras ×';
      btn.classList.toggle('active', authorAllEditoras);
    } else {
      btn.style.display = 'none';
    }
  }

  // ── Fetch + Paginação ──────────────────────────────────────────────────────

  function getEditoraFilter() {
    if (selectedEditoras.size > 0 || selectedGrupos.size > 0) {
      const editoras = new Set([...selectedEditoras]);
      for (const g of allGrupos) {
        if (selectedGrupos.has(g.nome)) for (const e of g.editoras) editoras.add(e);
      }
      return editoras;
    }
    const saved = loadEditorasState();
    if (saved === null) return new Set(allEditoras); // primeira visita: tudo curado
    return new Set(); // visitante zerou explicitamente
  }

  async function fetchBooks(reset = true) {
    if (reset) {
      currentPage = 1;
      allBooks = [];
      seenTitles.clear();
      hasMore = true;
      totalCount = null;
      document.getElementById('grid').innerHTML = '';
      scrollObserver.disconnect();
    }
    if (!hasMore || isFetching) return;
    isFetching = true;

    if (reset) setStatus('carregando…');
    else setStatus(`${allBooks.length.toLocaleString('pt-BR')} livros · carregando mais…`);

    let url = `${DIRECTUS_URL}/items/biblioteca?sort=-data_publicacao`
            + `&fields=id,isbn,titulo,autor,editora,capa_url,data_publicacao`
            + `&limit=${PAGE_LIMIT}&page=${currentPage}&meta=total_count`;

    const editoraFilter = getEditoraFilter();
    const ignoraEditoras = authorSearch && authorAllEditoras;

    // Lista vazia sem busca de autor = usuário escolheu não ver nenhuma editora
    if (editoraFilter.size === 0 && !ignoraEditoras) {
      document.getElementById('grid').innerHTML = '<div class="empty">nenhum livro — ajuste suas editoras</div>';
      setStatus('0 livros');
      isFetching = false;
      return;
    }

    // Monta filtro como lista de condições para _and
    const conditions = [];
    if (dateFrom || dateTo) {
      const d = {};
      if (dateFrom) d._gte = dateFrom.toISOString().slice(0, 10);
      if (dateTo)   d._lte = dateTo.toISOString().slice(0, 10);
      conditions.push({ data_publicacao: d });
    }
    if (!ignoraEditoras && editoraFilter.size > 0) {
      conditions.push({ editora: { _in: [...editoraFilter] } });
    }
    if (authorSearch) {
      // Divide em palavras: "raphael montes" → contém "raphael" E contém "montes"
      // Assim pega tanto "Raphael Montes" quanto "Montes, Raphael"
      authorSearch.trim().split(/\s+/).filter(Boolean)
        .forEach(w => conditions.push({ autor: { _icontains: w } }));
    }
    const f = conditions.length === 1 ? conditions[0] : { _and: conditions };
    url += `&filter=${encodeURIComponent(JSON.stringify(f))}`;

    try {
      const r = await fetch(url);
      const j = await r.json();
      const raw = j.data || [];
      totalCount = j.meta?.total_count ?? null;

      const newBooks = raw.filter(b => {
        const key = (b.titulo || '').toLowerCase().trim();
        if (seenTitles.has(key)) return false;
        seenTitles.add(key);
        return true;
      });

      allBooks = [...allBooks, ...newBooks];
      hasMore = raw.length === PAGE_LIMIT;
      currentPage++;

      if (reset) {
        renderGrid();
      } else {
        appendBooks(newBooks);
      }

      updateStatus();

      if (hasMore) {
        // Unobserve + re-observe força o IntersectionObserver a re-checar
        // mesmo que o sentinel já estivesse visível (evita bug de não carregar mais)
        const sentinel = document.getElementById('scroll-sentinel');
        scrollObserver.unobserve(sentinel);
        scrollObserver.observe(sentinel);
      } else {
        document.getElementById('scroll-sentinel').innerHTML = '';
      }
    } catch(e) {
      setStatus('erro ao carregar');
    } finally {
      isFetching = false;
    }
  }

  function updateStatus() {
    if (!allBooks.length) { setStatus('nenhum livro encontrado'); return; }
    if (totalCount && totalCount > allBooks.length) {
      setStatus(`${allBooks.length.toLocaleString('pt-BR')} de ${totalCount.toLocaleString('pt-BR')} livros`);
    } else {
      setStatus(`${allBooks.length.toLocaleString('pt-BR')} livro${allBooks.length !== 1 ? 's' : ''}`);
    }
  }

  // ── Grid ───────────────────────────────────────────────────────────────────

  function bookCardHTML(b) {
    return `<div class="book-card" onclick="openDetail(${b.id})">
      <div class="cover-wrap">
        ${b.capa_url
          ? `<img data-src="${escHtml(b.capa_url)}" alt="${escHtml(b.titulo)}" onerror="this.parentElement.innerHTML='<div class=cover-placeholder>📖</div>'" onload="this.style.opacity=1">`
          : '<div class="cover-placeholder">📖</div>'
        }
      </div>
      <div class="card-title">${escHtml(b.titulo)}</div>
      <div class="card-author">${escHtml(b.autor)}</div>
    </div>`;
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    if (!allBooks.length) {
      grid.innerHTML = '<div class="empty">nenhum livro encontrado</div>';
      return;
    }
    grid.innerHTML = allBooks.map(bookCardHTML).join('');
    setupLazyLoad();
  }

  function appendBooks(books) {
    if (!books.length) return;
    const grid = document.getElementById('grid');
    const empty = grid.querySelector('.empty');
    if (empty) empty.remove();
    const frag = document.createDocumentFragment();
    books.forEach(b => {
      const wrap = document.createElement('div');
      wrap.innerHTML = bookCardHTML(b);
      frag.appendChild(wrap.firstElementChild);
    });
    grid.appendChild(frag);
    setupLazyLoad();
  }

  let _lazyObserver;
  function setupLazyLoad() {
    if (_lazyObserver) _lazyObserver.disconnect();
    _lazyObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const img = entry.target;
        const src = img.dataset.src;
        if (src) { img.src = src; img.removeAttribute('data-src'); }
        _lazyObserver.unobserve(img);
      });
    }, { rootMargin: '400px 0px' });
    document.querySelectorAll('#grid img[data-src]').forEach(img => _lazyObserver.observe(img));
  }

  // ── Painel editoras (unificado) ────────────────────────────────────────────

  const EDITORAS_KEY = 'livros_wiki_editoras';
  let _epInactive = null;

  function loadEditorasState() {
    const raw = localStorage.getItem(EDITORAS_KEY);
    if (!raw) return null;
    try {
      const p = JSON.parse(raw);
      if (p && p.v === 2) return p;
      return null; // formato antigo — ignora
    } catch(e) { return null; }
  }

  function saveEditorasState() {
    localStorage.setItem(EDITORAS_KEY, JSON.stringify({
      v: 2, grupos: [...selectedGrupos], editoras: [...selectedEditoras]
    }));
  }

  function renderEditorasTags() {
    const wrap = document.getElementById('editoras-tags');
    const grupoTags = [...selectedGrupos].map(nome => {
      const g = allGrupos.find(x => x.nome === nome);
      const cor = g?.cor || '#888';
      return `<span class="editoras-tag" style="border-color:${cor};color:${cor}">${escHtml(nome)}<span class="editoras-tag-remove" data-grupo="${escHtml(nome)}">×</span></span>`;
    }).join('');
    const editoraTags = [...selectedEditoras].map(e =>
      `<span class="editoras-tag">${escHtml(e)}<span class="editoras-tag-remove" data-editora="${escHtml(e)}">×</span></span>`
    ).join('');
    wrap.innerHTML = grupoTags + editoraTags;
  }

  document.getElementById('editoras-tags').addEventListener('click', e => {
    const rem = e.target.closest('.editoras-tag-remove');
    if (!rem) return;
    if (rem.dataset.grupo) selectedGrupos.delete(rem.dataset.grupo);
    else if (rem.dataset.editora) selectedEditoras.delete(rem.dataset.editora);
    saveEditorasState();
    renderEditorasTags();
    fetchBooks(true);
  });

  async function openEditorasPanel() {
    if (_epInactive === null) {
      try {
        const r = await fetch(
          `${DIRECTUS_URL}/items/selos?fields=nome_display&limit=2000&filter[ativo][_eq]=false&sort=nome_display`
        );
        const j = await r.json();
        _epInactive = [...new Set((j.data || []).map(s => s.nome_display).filter(Boolean))].sort();
      } catch(e) { _epInactive = []; }
    }
    document.getElementById('ep-search').value = '';
    renderEpBody();
    document.getElementById('ep-overlay').classList.add('open');
  }

  function closeEditorasPanel() {
    document.getElementById('ep-overlay').classList.remove('open');
    saveEditorasState();
    renderEditorasTags();
  }

  function renderEpBody() {
    const q = document.getElementById('ep-search').value.toLowerCase();
    const body = document.getElementById('ep-body');

    const groupedHtml = allGrupos.map(g => {
      const matchNome = !q || g.nome.toLowerCase().includes(q);
      const matchEdits = g.editoras.some(e => e.toLowerCase().includes(q));
      if (q && !matchNome && !matchEdits) return '';
      const isOn = selectedGrupos.has(g.nome);
      const editTags = g.editoras
        .filter(e => !q || matchNome || e.toLowerCase().includes(q))
        .map(e => epEditoraTagHtml(e))
        .join('');
      return `<div class="ep-group">
        <div class="ep-group-nome">
          <span class="ep-tag${isOn ? ' on' : ''}" style="border-color:${g.cor};color:${isOn ? '#fff' : g.cor};${isOn ? `background:${g.cor}33` : ''}" onclick="epToggleGrupo('${escHtml(g.nome)}')">${escHtml(g.nome)}</span>
        </div>
        <div class="ep-tags" style="margin-top:6px">${editTags}</div>
      </div>`;
    }).join('');

    const activeInGrupos = new Set(allGrupos.flatMap(g => g.editoras));
    const indeps = allEditoras
      .filter(e => !activeInGrupos.has(e) && (!q || e.toLowerCase().includes(q)))
      .map(e => epEditoraTagHtml(e))
      .join('');
    const indepsHtml = indeps
      ? `<div class="ep-group"><div class="ep-group-nome" style="color:#666">Independentes</div><div class="ep-tags">${indeps}</div></div>`
      : '';

    const inactiveTags = (_epInactive || [])
      .filter(e => !q || e.toLowerCase().includes(q))
      .map(e => epEditoraTagHtml(e))
      .join('');
    const inactiveHtml = inactiveTags
      ? `<div class="ep-section-label">outras editoras</div><div class="ep-group"><div class="ep-tags">${inactiveTags}</div></div>`
      : '';

    body.innerHTML = groupedHtml || indepsHtml
      ? `<div class="ep-section-label">curadas</div>${groupedHtml}${indepsHtml}${inactiveHtml}`
      : inactiveHtml || '<div style="padding:40px 20px;color:#333;text-align:center;font-size:.85rem">nenhuma encontrada</div>';

    updateEpCount();
  }

  function epEditoraTagHtml(nome) {
    const on = selectedEditoras.has(nome) ? ' on' : '';
    return `<span class="ep-tag${on}" data-editora-tag="${escHtml(nome)}" onclick="epToggleEditora('${escHtml(nome)}')">${escHtml(nome)}</span>`;
  }

  function epToggleGrupo(nome) {
    if (selectedGrupos.has(nome)) selectedGrupos.delete(nome);
    else selectedGrupos.add(nome);
    renderEpBody();
    fetchBooks(true);
  }

  function epToggleEditora(nome) {
    if (selectedEditoras.has(nome)) selectedEditoras.delete(nome);
    else selectedEditoras.add(nome);
    document.querySelectorAll('[data-editora-tag]').forEach(el => {
      if (el.dataset.editoraTag === nome) el.classList.toggle('on', selectedEditoras.has(nome));
    });
    updateEpCount();
    fetchBooks(true);
  }

  function epSetDefault() {
    selectedGrupos   = new Set();
    selectedEditoras = new Set();
    localStorage.removeItem(EDITORAS_KEY);
    renderEpBody();
    fetchBooks(true);
  }

  function epSetNone() {
    selectedGrupos   = new Set();
    selectedEditoras = new Set();
    saveEditorasState();
    renderEpBody();
    fetchBooks(true);
  }

  function epSetAll() {
    selectedGrupos   = new Set(allGrupos.map(g => g.nome));
    selectedEditoras = new Set([...allEditoras, ...(_epInactive || [])]);
    renderEpBody();
    fetchBooks(true);
  }

  function updateEpCount() {
    const t = selectedGrupos.size + selectedEditoras.size;
    document.getElementById('ep-count').textContent =
      t ? `${t} selecionada${t !== 1 ? 's' : ''}` : 'nenhuma selecionada (padrão curado)';
  }

  // ── Vista salva ────────────────────────────────────────────────────────────

  function saveCurrentView() {
    const view = {
      preset: currentPreset,
      editoras: [...selectedEditoras],
      grupos: [...selectedGrupos],
      dateFrom: dateFrom ? dateFrom.toISOString() : null,
      dateTo:   dateTo   ? dateTo.toISOString()   : null,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(view));
  }

  function clearSavedView() {
    localStorage.removeItem(STORAGE_KEY);
  }

  function hasSavedView() {
    return !!localStorage.getItem(STORAGE_KEY);
  }

  function loadSavedView() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    try { return JSON.parse(raw); } catch(e) { return null; }
  }

  function updateSaveBtn() {
    const btn = document.getElementById('save-view-btn');
    if (hasSavedView()) {
      btn.textContent = 'vista salva ✓';
      btn.classList.add('saved');
    } else {
      btn.textContent = 'salvar vista';
      btn.classList.remove('saved');
    }
  }

  function toggleSaveView() {
    if (hasSavedView()) {
      clearSavedView();
    } else {
      saveCurrentView();
    }
    updateSaveBtn();
  }

  // ── Detalhe ────────────────────────────────────────────────────────────────

  async function openDetail(id) {
    const b = allBooks.find(x => x.id === id);
    if (!b) return;

    document.getElementById('detail-cover').innerHTML = b.capa_url
      ? `<img src="${escHtml(b.capa_url)}" alt="${escHtml(b.titulo)}" onerror="this.parentElement.innerHTML='<div class=detail-cover-placeholder>📖</div>'">`
      : '<div class="detail-cover-placeholder">📖</div>';

    document.getElementById('detail-header').innerHTML = `
      <div class="detail-publisher-badge">${escHtml(b.editora)}</div>
      <div class="detail-title">${escHtml(b.titulo)}</div>
      <div class="detail-author">${escHtml(b.autor)}</div>
      <div class="detail-tags">
        ${b.data_publicacao ? `<span class="detail-tag">${formatDate(b.data_publicacao)}</span>` : ''}
        ${b.isbn ? `<span class="detail-tag">ISBN ${escHtml(b.isbn)}</span>` : ''}
      </div>
    `;

    document.getElementById('detail-body').innerHTML =
      '<div class="detail-sinopse" style="color:#444">carregando...</div>';
    document.getElementById('detail-overlay').classList.add('open');
    window.scrollTo(0, 0);

    try {
      const r = await fetch(
        `${DIRECTUS_URL}/items/biblioteca/${id}?fields=sinopse,biografia_autor,contributors`
      );
      const j = await r.json();
      const d = j.data || {};
      const contribs = formatContributors(d.contributors);
      document.getElementById('detail-body').innerHTML = `
        ${contribs ? `<div class="detail-contributors">${contribs}</div>` : ''}
        ${d.sinopse
          ? `<div class="detail-sinopse">${d.sinopse.split('\n').filter(Boolean).map(p => `<p>${escHtml(p)}</p>`).join('')}</div>`
          : '<div class="detail-sinopse" style="color:#444">sinopse não disponível</div>'
        }
        ${d.biografia_autor ? `<div class="detail-bio"><span class="detail-bio-label">sobre o autor</span>${escHtml(d.biografia_autor)}</div>` : ''}
      `;
    } catch(e) {
      document.getElementById('detail-body').innerHTML =
        '<div class="detail-sinopse" style="color:#444">sinopse não disponível</div>';
    }
  }

  function closeDetail() {
    document.getElementById('detail-overlay').classList.remove('open');
  }

  document.getElementById('detail-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('detail-overlay')) closeDetail();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeDetail();
      if (document.getElementById('ep-overlay').classList.contains('open')) closeEditorasPanel();
    }
  });

  // ── Utils ──────────────────────────────────────────────────────────────────

  function formatDate(s) {
    if (!s) return '';
    return new Intl.DateTimeFormat('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' })
      .format(new Date(s + 'T12:00:00'));
  }

  const CONTRIBUTOR_TYPES = {
    A01: 'autor', A12: 'ilustrador', A38: 'ilustrador', B06: 'tradução',
    B01: 'edição', A36: 'direção de arte', A11: 'fotografias', A09: 'introdução',
  };

  function formatContributors(contributors) {
    if (!contributors || !contributors.length) return '';
    const groups = {};
    for (const c of contributors) {
      const role = CONTRIBUTOR_TYPES[c.type] || null;
      if (!role) continue;
      const name = c.groupName || [c.firstName, c.lastName].filter(Boolean).join(' ');
      if (!name) continue;
      if (!groups[role]) groups[role] = [];
      groups[role].push(escHtml(name));
    }
    return Object.entries(groups)
      .map(([role, names]) => `<span class="contrib-role">${role}:</span> ${names.join(', ')}`)
      .join(' &nbsp;·&nbsp; ');
  }

  function escHtml(s = '') {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  // ── Init ───────────────────────────────────────────────────────────────────

  async function init() {
    buildDateSelects();
    await loadGrupos();

    const saved = loadEditorasState();
    if (saved) {
      selectedGrupos   = new Set(saved.grupos   || []);
      selectedEditoras = new Set(saved.editoras || []);
    }
    renderEditorasTags();
    updateSaveBtn();

    setPreset('lancamentos', document.querySelector('[data-preset="lancamentos"]'));
  }

  init();
</script>
