<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #161616;
      --border: #242424;
      --text: #e0d8ce;
      --muted: #666;
      --accent: #c9a84c;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 32px 48px 0;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.06em;
      color: #f0e8dc;
      margin-bottom: 6px;
    }

    header p {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .status {
      padding: 16px 48px 0;
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 28px 20px;
      padding: 24px 48px 80px;
      align-items: end;
    }

    .book-card {
      cursor: pointer;
      transition: transform 0.15s;
    }

    .book-card:hover { transform: translateY(-4px); }
    .book-card:hover .card-title { color: var(--accent); }

    .cover-wrap {
      position: relative;
      width: 100%;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 9px;
    }

    .cover-wrap img {
      width: 100%;
      height: auto;
      display: block;
      transition: opacity 0.3s;
    }

    .cover-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 2rem;
    }

    .card-title {
      font-size: 0.82rem;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color 0.15s;
    }

    .card-author {
      font-size: 0.73rem;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .empty {
      grid-column: 1/-1;
      text-align: center;
      color: #333;
      padding: 80px 0;
      font-size: 0.9rem;
    }

    /* ── DETALHE ── */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 40px 20px;
    }

    .detail-overlay.open { display: flex; }

    .detail-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 680px;
      max-width: 100%;
      padding: 0;
      overflow: hidden;
      position: relative;
    }

    .detail-back {
      position: absolute;
      top: 16px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      border: 1px solid #333;
      color: #aaa;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      z-index: 10;
      transition: background 0.15s;
    }
    .detail-back:hover { background: rgba(0,0,0,0.8); color: #fff; }

    .detail-hero {
      display: flex;
      gap: 0;
      min-height: 280px;
    }

    .detail-cover {
      width: 180px;
      flex-shrink: 0;
      background: #111;
    }

    .detail-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .detail-cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2a2a2a;
      font-size: 3rem;
    }

    .detail-header {
      flex: 1;
      padding: 48px 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: linear-gradient(to bottom, #111 0%, var(--surface) 100%);
    }

    .detail-publisher-badge {
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .detail-title {
      font-size: 1.4rem;
      font-weight: normal;
      line-height: 1.3;
      color: #f0e8dc;
      margin-bottom: 6px;
    }

    .detail-author {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 12px;
    }

    .detail-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .detail-tag {
      font-size: 0.72rem;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: #666;
    }

    .detail-body {
      padding: 24px 28px 32px;
    }

    .detail-sinopse {
      font-size: 0.88rem;
      line-height: 1.7;
      color: #aaa;
    }

    .detail-sinopse p { margin-bottom: 12px; }
    .detail-sinopse p:last-child { margin-bottom: 0; }

    /* ── FILTROS ── */
    .filters-row {
      padding: 20px 48px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill, .pill-editora {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 0.78rem;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
      font-family: inherit;
    }

    .pill:hover, .pill-editora:hover { border-color: #444; color: #aaa; }

    .pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f0f0f;
    }

    .pill-editora.active {
      background: #2a2a2a;
      border-color: #555;
      color: #ddd;
    }

    .detail-contributors {
      font-size: 0.78rem;
      color: #666;
      margin-bottom: 20px;
    }
    .contrib-role { color: #555; }

    .detail-bio {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      line-height: 1.7;
      color: #888;
    }
    .detail-bio-label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<header>
  <h1>biblioteca</h1>
  <p>livros das editoras selecionadas</p>
</header>

<div class="filters-row" id="filters-category">
  <button class="pill" onclick="setCategory('prevenda', this)">em pré-venda</button>
  <button class="pill active" onclick="setCategory('lancamentos', this)">lançamentos</button>
  <button class="pill" onclick="setCategory('catalogo', this)">todo catálogo</button>
</div>
<div class="filters-row" id="filters-editora">
  <button class="pill-editora active" onclick="setEditora('all', this)">todas</button>
</div>

<div class="status" id="status"></div>

<div class="grid" id="grid"></div>

<!-- Detalhe -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel" id="detail-panel">
    <button class="detail-back" onclick="closeDetail()">← voltar</button>
    <div class="detail-hero">
      <div class="detail-cover" id="detail-cover"></div>
      <div class="detail-header" id="detail-header"></div>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
  const DIRECTUS_URL   = 'https://directus-production-afdd.up.railway.app';
  const DIRECTUS_TOKEN = '73IhvvuNMBy-et-_0Ore5ZH2jo25pnU5';

  let allBooks = [];
  let currentCategory = 'lancamentos';
  let currentEditora  = 'all';

  async function init() {
    setStatus('carregando...');
    try {
      const r = await fetch(
        `${DIRECTUS_URL}/items/biblioteca?limit=2000&sort=-data_publicacao&fields=id,isbn,titulo,autor,editora,capa_url,sinopse,biografia_autor,contributors,data_publicacao`,
        { headers: { Authorization: `Bearer ${DIRECTUS_TOKEN}` } }
      );
      const j = await r.json();
      const raw = j.data || [];
      const seen = new Set();
      allBooks = raw.filter(b => {
        const key = (b.titulo || '').toLowerCase().trim();
        if (seen.has(key)) return false;
        seen.add(key); return true;
      });
      buildEditoraFilter();
      renderGrid();
    } catch(e) {
      setStatus('erro ao carregar');
    }
  }

  function buildEditoraFilter() {
    const container = document.getElementById('filters-editora');
    container.innerHTML = '<button class="pill-editora active" onclick="setEditora(\'all\', this)">todas</button>';
    const editoras = [...new Set(allBooks.map(b => b.editora).filter(Boolean))].sort();
    editoras.forEach(ed => {
      const btn = document.createElement('button');
      btn.className = 'pill-editora';
      btn.textContent = ed;
      btn.onclick = () => setEditora(ed, btn);
      container.appendChild(btn);
    });
  }

  function setCategory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  }

  function setEditora(ed, btn) {
    currentEditora = ed;
    document.querySelectorAll('.pill-editora').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  }

  function filterBooks() {
    const today = new Date(); today.setHours(0,0,0,0);
    const cutoff = new Date(); cutoff.setMonth(cutoff.getMonth() - 4); cutoff.setHours(0,0,0,0);
    let books = allBooks;
    if (currentCategory === 'prevenda') {
      books = books.filter(b => b.data_publicacao && new Date(b.data_publicacao + 'T12:00:00') > today);
    } else if (currentCategory === 'lancamentos') {
      books = books.filter(b => {
        if (!b.data_publicacao) return false;
        const d = new Date(b.data_publicacao + 'T12:00:00');
        return d >= cutoff && d <= today;
      });
    }
    if (currentEditora !== 'all') books = books.filter(b => b.editora === currentEditora);
    return books;
  }

  function renderGrid() {
    const books = filterBooks();
    const grid = document.getElementById('grid');
    setStatus(`${books.length} livro${books.length !== 1 ? 's' : ''}`);
    if (!books.length) {
      grid.innerHTML = '<div class="empty">nenhum livro encontrado</div>';
      return;
    }
    grid.innerHTML = books.map((b) => `
      <div class="book-card" onclick="openDetail(${b.id})">
        <div class="cover-wrap">
          ${b.capa_url
            ? `<img src="${escHtml(b.capa_url)}" alt="${escHtml(b.titulo)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=cover-placeholder>📖</div>'">`
            : '<div class="cover-placeholder">📖</div>'
          }
        </div>
        <div class="card-title">${escHtml(b.titulo)}</div>
        <div class="card-author">${escHtml(b.autor)}</div>
      </div>
    `).join('');
  }

  function openDetail(id) {
    const b = allBooks.find(x => x.id === id);
    if (!b) return;

    document.getElementById('detail-cover').innerHTML = b.capa_url
      ? `<img src="${escHtml(b.capa_url)}" alt="${escHtml(b.titulo)}" onerror="this.parentElement.innerHTML='<div class=detail-cover-placeholder>📖</div>'">`
      : '<div class="detail-cover-placeholder">📖</div>';

    document.getElementById('detail-header').innerHTML = `
      <div class="detail-publisher-badge">${escHtml(b.editora)}</div>
      <div class="detail-title">${escHtml(b.titulo)}</div>
      <div class="detail-author">${escHtml(b.autor)}</div>
      <div class="detail-tags">
        ${b.data_publicacao ? `<span class="detail-tag">${formatDate(b.data_publicacao)}</span>` : ''}
        ${b.isbn ? `<span class="detail-tag">ISBN ${escHtml(b.isbn)}</span>` : ''}
      </div>
    `;

    const contribs = formatContributors(b.contributors);
    document.getElementById('detail-body').innerHTML = `
      ${contribs ? `<div class="detail-contributors">${contribs}</div>` : ''}
      ${b.sinopse
        ? `<div class="detail-sinopse">${b.sinopse.split('\n').filter(Boolean).map(p => `<p>${escHtml(p)}</p>`).join('')}</div>`
        : '<div class="detail-sinopse" style="color:#444">sinopse não disponível</div>'
      }
      ${b.biografia_autor ? `<div class="detail-bio"><span class="detail-bio-label">sobre o autor</span>${escHtml(b.biografia_autor)}</div>` : ''}
    `;

    document.getElementById('detail-overlay').classList.add('open');
    window.scrollTo(0, 0);
  }

  function closeDetail() {
    document.getElementById('detail-overlay').classList.remove('open');
  }

  document.getElementById('detail-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('detail-overlay')) closeDetail();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetail();
  });

  function formatDate(s) {
    if (!s) return '';
    return new Intl.DateTimeFormat('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' })
      .format(new Date(s + 'T12:00:00'));
  }

  const CONTRIBUTOR_TYPES = {
    A01: 'autor', A12: 'ilustrador', A38: 'ilustrador', B06: 'tradução',
    B01: 'edição', A36: 'direção de arte', A11: 'fotografias', A09: 'introdução',
  };

  function formatContributors(contributors) {
    if (!contributors || !contributors.length) return '';
    const groups = {};
    for (const c of contributors) {
      const role = CONTRIBUTOR_TYPES[c.type] || null;
      if (!role) continue;
      const name = c.groupName || [c.firstName, c.lastName].filter(Boolean).join(' ');
      if (!name) continue;
      if (!groups[role]) groups[role] = [];
      groups[role].push(escHtml(name));
    }
    return Object.entries(groups)
      .map(([role, names]) => `<span class="contrib-role">${role}:</span> ${names.join(', ')}`)
      .join(' &nbsp;·&nbsp; ');
  }

  function escHtml(s = '') {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  init();
</script>
</body>
</html>
