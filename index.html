<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #161616;
      --border: #242424;
      --text: #e0d8ce;
      --muted: #666;
      --accent: #c9a84c;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 32px 48px 0;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.06em;
      color: #f0e8dc;
      margin-bottom: 6px;
    }

    header p {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .status {
      padding: 16px 48px 0;
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 28px 20px;
      padding: 24px 48px 80px;
      align-items: start;
    }

    .book-card {
      cursor: pointer;
      transition: transform 0.15s;
    }

    .book-card:hover { transform: translateY(-4px); }
    .book-card:hover .card-title { color: var(--accent); }

    .cover-wrap {
      position: relative;
      width: 100%;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 9px;
      display: flex;
      align-items: flex-end;
    }

    .cover-wrap img {
      width: 100%;
      height: auto;
      display: block;
      transition: opacity 0.3s;
    }

    .cover-wrap.cover-standard {
      aspect-ratio: 2/3;
    }
    .cover-wrap.cover-standard img {
      height: 100%;
      object-fit: cover;
    }

    .cover-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 2rem;
    }

    .card-title {
      font-size: 0.82rem;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color 0.15s;
    }

    .card-author {
      font-size: 0.73rem;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .empty {
      grid-column: 1/-1;
      text-align: center;
      color: #333;
      padding: 80px 0;
      font-size: 0.9rem;
    }

    /* ── DETALHE ── */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 40px 20px;
    }

    .detail-overlay.open { display: flex; }

    .detail-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 680px;
      max-width: 100%;
      padding: 0;
      overflow: hidden;
      position: relative;
    }

    .detail-back {
      position: absolute;
      top: 16px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      border: 1px solid #333;
      color: #aaa;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      z-index: 10;
      transition: background 0.15s;
    }
    .detail-back:hover { background: rgba(0,0,0,0.8); color: #fff; }

    .detail-hero {
      display: flex;
      gap: 0;
      min-height: 280px;
    }

    .detail-cover {
      width: 180px;
      flex-shrink: 0;
      background: #111;
    }

    .detail-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .detail-cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2a2a2a;
      font-size: 3rem;
    }

    .detail-header {
      flex: 1;
      padding: 48px 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: linear-gradient(to bottom, #111 0%, var(--surface) 100%);
    }

    .detail-publisher-badge {
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .detail-title {
      font-size: 1.4rem;
      font-weight: normal;
      line-height: 1.3;
      color: #f0e8dc;
      margin-bottom: 6px;
    }

    .detail-author {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 12px;
    }

    .detail-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .detail-tag {
      font-size: 0.72rem;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: #666;
    }

    .detail-body {
      padding: 24px 28px 32px;
    }

    .detail-sinopse {
      font-size: 0.88rem;
      line-height: 1.7;
      color: #aaa;
    }

    .detail-sinopse p { margin-bottom: 12px; }
    .detail-sinopse p:last-child { margin-bottom: 0; }

    /* ── FILTROS ── */
    .filters-row {
      padding: 16px 48px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* Pills de preset */
    .pill {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 0.78rem;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
      font-family: inherit;
    }
    .pill:hover { border-color: #444; color: #aaa; }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #0f0f0f; }

    /* Seletores de data */
    .filter-label {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .date-sel {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.78rem;
      font-family: inherit;
      padding: 4px 6px;
      border-radius: 6px;
      cursor: pointer;
      outline: none;
    }
    .date-sel:focus { border-color: #444; }
    .date-sep { color: var(--muted); font-size: 0.78rem; margin: 0 4px; }

    /* Busca de editora */
    .pub-search-wrap { position: relative; }
    .pub-input {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.78rem;
      font-family: inherit;
      padding: 5px 13px;
      border-radius: 20px;
      outline: none;
      width: 150px;
      transition: border-color 0.15s;
    }
    .pub-input::placeholder { color: var(--muted); }
    .pub-input:focus { border-color: #444; }

    .pub-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: var(--surface);
      border: 1px solid #333;
      border-radius: 8px;
      min-width: 220px;
      max-height: 260px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .pub-dropdown.open { display: block; }
    .pub-option {
      padding: 8px 14px;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.1s;
    }
    .pub-option:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .pub-option.selected { color: var(--text); }
    .pub-option.selected::before { content: '✓ '; color: var(--accent); }
    .pub-empty { cursor: default; color: #444; }
    .pub-empty:hover { background: transparent; }

    /* Tags de editoras selecionadas */
    .pub-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px 4px 12px;
      border-radius: 20px;
      border: 1px solid #3a3a3a;
      background: #1e1e1e;
      font-size: 0.75rem;
      color: var(--text);
    }
    .pub-tag-remove {
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1;
      transition: color 0.15s;
    }
    .pub-tag-remove:hover { color: var(--text); }

    .detail-contributors {
      font-size: 0.78rem;
      color: #666;
      margin-bottom: 20px;
    }
    .contrib-role { color: #555; }

    .detail-bio {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      line-height: 1.7;
      color: #888;
    }
    .detail-bio-label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<header>
  <h1>biblioteca</h1>
  <p>livros das editoras selecionadas</p>
</header>

<div class="filters-row" id="filters-category">
  <button class="pill" onclick="setPreset('prevenda',this)">pré-venda</button>
  <button class="pill active" onclick="setPreset('lancamentos',this)">lançamentos</button>
  <button class="pill" onclick="setPreset('tudo',this)">tudo</button>
</div>
<div class="filters-row" id="filters-date">
  <span class="filter-label">de</span>
  <select class="date-sel" id="from-month" onchange="onDateChange()"></select>
  <select class="date-sel" id="from-year" onchange="onDateChange()"></select>
  <span class="filter-label">até</span>
  <select class="date-sel" id="to-month" onchange="onDateChange()"></select>
  <select class="date-sel" id="to-year" onchange="onDateChange()"></select>
</div>
<div class="filters-row" id="filters-pub">
  <div class="pub-search-wrap" id="pub-search-wrap">
    <input class="pub-input" id="pub-input" type="text" placeholder="editora…"
      oninput="onPubInput(this.value)" onfocus="openPubDropdown()" autocomplete="off">
    <div class="pub-dropdown" id="pub-dropdown"></div>
  </div>
  <div id="pub-tags"></div>
</div>

<div class="status" id="status"></div>

<div class="grid" id="grid"></div>

<!-- Detalhe -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel" id="detail-panel">
    <button class="detail-back" onclick="closeDetail()">← voltar</button>
    <div class="detail-hero">
      <div class="detail-cover" id="detail-cover"></div>
      <div class="detail-header" id="detail-header"></div>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
  const DIRECTUS_URL   = 'https://directus-production-afdd.up.railway.app';
  const DIRECTUS_TOKEN = '73IhvvuNMBy-et-_0Ore5ZH2jo25pnU5';

  let allBooks    = [];
  let allEditoras = [];
  let selectedEditoras = new Set();
  let dateFrom = null;
  let dateTo   = null;

  const MONTHS_PT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

  // ── Datas ──────────────────────────────────────────────────────────────────

  function buildDateSelects() {
    const year = new Date().getFullYear();
    ['from-month','to-month'].forEach(id => {
      const sel = document.getElementById(id);
      MONTHS_PT.forEach((m, i) => {
        const o = document.createElement('option');
        o.value = i; o.textContent = m; sel.appendChild(o);
      });
    });
    ['from-year','to-year'].forEach(id => {
      const sel = document.getElementById(id);
      for (let y = 2018; y <= year + 2; y++) {
        const o = document.createElement('option');
        o.value = y; o.textContent = y; sel.appendChild(o);
      }
    });
  }

  function setDateSelects(from, to) {
    if (from) {
      document.getElementById('from-month').value = from.getMonth();
      document.getElementById('from-year').value  = from.getFullYear();
    }
    if (to) {
      document.getElementById('to-month').value = to.getMonth();
      document.getElementById('to-year').value  = to.getFullYear();
    }
  }

  function setPreset(name, btn) {
    const today = new Date();
    if (name === 'prevenda') {
      const from = new Date(today); from.setDate(today.getDate() + 1);
      const to   = new Date(today); to.setMonth(today.getMonth() + 18);
      dateFrom = from; dateTo = to;
    } else if (name === 'lancamentos') {
      const from = new Date(today); from.setMonth(today.getMonth() - 4); from.setDate(1);
      dateFrom = from; dateTo = new Date(today);
    } else {
      const to = new Date(today); to.setMonth(today.getMonth() + 18);
      dateFrom = new Date(2018, 0, 1); dateTo = to;
    }
    setDateSelects(dateFrom, dateTo);
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    if (btn) btn.classList.add('active');
    renderGrid();
  }

  function onDateChange() {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    const fm = +document.getElementById('from-month').value;
    const fy = +document.getElementById('from-year').value;
    const tm = +document.getElementById('to-month').value;
    const ty = +document.getElementById('to-year').value;
    dateFrom = new Date(fy, fm, 1);
    dateTo   = new Date(ty, tm + 1, 0);
    renderGrid();
  }

  // ── Editoras ───────────────────────────────────────────────────────────────

  function buildPublisherList() {
    allEditoras = [...new Set(allBooks.map(b => b.editora).filter(Boolean))].sort();
  }

  function onPubInput(query) { openPubDropdown(query); }

  function openPubDropdown(query) {
    const q = query !== undefined ? query : document.getElementById('pub-input').value;
    const filtered = allEditoras.filter(e => !q || e.toLowerCase().includes(q.toLowerCase()));
    const dd = document.getElementById('pub-dropdown');
    dd.innerHTML = filtered.length
      ? filtered.map(e =>
          `<div class="pub-option${selectedEditoras.has(e) ? ' selected' : ''}" data-pub="${escHtml(e)}">${escHtml(e)}</div>`
        ).join('')
      : '<div class="pub-option pub-empty">nenhuma encontrada</div>';
    dd.classList.add('open');
  }

  function closePubDropdown() {
    document.getElementById('pub-dropdown').classList.remove('open');
    document.getElementById('pub-input').value = '';
  }

  function toggleEditora(name) {
    if (selectedEditoras.has(name)) selectedEditoras.delete(name);
    else selectedEditoras.add(name);
    openPubDropdown();
    renderPublisherTags();
    renderGrid();
  }

  function renderPublisherTags() {
    document.getElementById('pub-tags').innerHTML = [...selectedEditoras].map(e =>
      `<span class="pub-tag">${escHtml(e)}<span class="pub-tag-remove" data-pub="${escHtml(e)}">×</span></span>`
    ).join('');
  }

  document.getElementById('pub-dropdown').addEventListener('click', e => {
    const opt = e.target.closest('.pub-option');
    if (opt && opt.dataset.pub) toggleEditora(opt.dataset.pub);
  });
  document.getElementById('pub-tags').addEventListener('click', e => {
    const rem = e.target.closest('.pub-tag-remove');
    if (rem) toggleEditora(rem.dataset.pub);
  });
  document.addEventListener('click', e => {
    if (!document.getElementById('pub-search-wrap').contains(e.target)) closePubDropdown();
  });

  // ── Filter + fetch ─────────────────────────────────────────────────────────

  function filterBooks() {
    let books = allBooks;
    if (dateFrom) books = books.filter(b => b.data_publicacao &&
      new Date(b.data_publicacao + 'T12:00:00') >= dateFrom);
    if (dateTo)   books = books.filter(b => b.data_publicacao &&
      new Date(b.data_publicacao + 'T12:00:00') <= dateTo);
    if (selectedEditoras.size > 0)
      books = books.filter(b => selectedEditoras.has(b.editora));
    return books;
  }

  async function init() {
    buildDateSelects();
    setPreset('lancamentos', document.querySelector('.pill.active'));
    setStatus('carregando...');
    try {
      const r = await fetch(
        `${DIRECTUS_URL}/items/biblioteca?limit=2000&sort=-data_publicacao&fields=id,isbn,titulo,autor,editora,capa_url,sinopse,biografia_autor,contributors,data_publicacao`,
        { headers: { Authorization: `Bearer ${DIRECTUS_TOKEN}` } }
      );
      const j = await r.json();
      const raw = j.data || [];
      const seen = new Set();
      allBooks = raw.filter(b => {
        const key = (b.titulo || '').toLowerCase().trim();
        if (seen.has(key)) return false;
        seen.add(key); return true;
      });
      buildPublisherList();
      renderGrid();
    } catch(e) {
      setStatus('erro ao carregar');
    }
  }

  function onCoverLoad(img) {
    const w = img.naturalWidth;
    const h = img.naturalHeight;
    // Normaliza apenas 14x21 (200x300) e 16x23 (200x288)
    if (w === 200 && ((h >= 298 && h <= 302) || (h >= 286 && h <= 290))) {
      img.closest('.cover-wrap').classList.add('cover-standard');
    }
    equalizeCoverRows();
  }

  function equalizeCoverRows() {
    const cards = [...document.querySelectorAll('#grid .book-card')];
    if (!cards.length) return;
    // Reset heights so we can measure natural image heights
    cards.forEach(c => { const w = c.querySelector('.cover-wrap'); if (w) w.style.height = ''; });
    requestAnimationFrame(() => {
      // Group cards by their offsetTop (= same grid row)
      const rows = new Map();
      cards.forEach(card => {
        const top = card.offsetTop;
        if (!rows.has(top)) rows.set(top, []);
        rows.get(top).push(card);
      });
      // For each row: find max cover height, apply to all
      rows.forEach(rowCards => {
        const maxH = Math.max(...rowCards.map(c => {
          const w = c.querySelector('.cover-wrap'); return w ? w.offsetHeight : 0;
        }));
        rowCards.forEach(c => {
          const w = c.querySelector('.cover-wrap'); if (w) w.style.height = maxH + 'px';
        });
      });
    });
  }

  let _eqTimer;
  window.addEventListener('resize', () => { clearTimeout(_eqTimer); _eqTimer = setTimeout(equalizeCoverRows, 150); });

  function renderGrid() {
    const books = filterBooks();
    const grid = document.getElementById('grid');
    setStatus(`${books.length} livro${books.length !== 1 ? 's' : ''}`);
    if (!books.length) {
      grid.innerHTML = '<div class="empty">nenhum livro encontrado</div>';
      return;
    }
    grid.innerHTML = books.map((b) => `
      <div class="book-card" onclick="openDetail(${b.id})">
        <div class="cover-wrap">
          ${b.capa_url
            ? `<img src="${escHtml(b.capa_url)}" alt="${escHtml(b.titulo)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=cover-placeholder>📖</div>'" onload="onCoverLoad(this)">`
            : '<div class="cover-placeholder">📖</div>'
          }
        </div>
        <div class="card-title">${escHtml(b.titulo)}</div>
        <div class="card-author">${escHtml(b.autor)}</div>
      </div>
    `).join('');
    equalizeCoverRows();
  }

  function openDetail(id) {
    const b = allBooks.find(x => x.id === id);
    if (!b) return;

    document.getElementById('detail-cover').innerHTML = b.capa_url
      ? `<img src="${escHtml(b.capa_url)}" alt="${escHtml(b.titulo)}" onerror="this.parentElement.innerHTML='<div class=detail-cover-placeholder>📖</div>'">`
      : '<div class="detail-cover-placeholder">📖</div>';

    document.getElementById('detail-header').innerHTML = `
      <div class="detail-publisher-badge">${escHtml(b.editora)}</div>
      <div class="detail-title">${escHtml(b.titulo)}</div>
      <div class="detail-author">${escHtml(b.autor)}</div>
      <div class="detail-tags">
        ${b.data_publicacao ? `<span class="detail-tag">${formatDate(b.data_publicacao)}</span>` : ''}
        ${b.isbn ? `<span class="detail-tag">ISBN ${escHtml(b.isbn)}</span>` : ''}
      </div>
    `;

    const contribs = formatContributors(b.contributors);
    document.getElementById('detail-body').innerHTML = `
      ${contribs ? `<div class="detail-contributors">${contribs}</div>` : ''}
      ${b.sinopse
        ? `<div class="detail-sinopse">${b.sinopse.split('\n').filter(Boolean).map(p => `<p>${escHtml(p)}</p>`).join('')}</div>`
        : '<div class="detail-sinopse" style="color:#444">sinopse não disponível</div>'
      }
      ${b.biografia_autor ? `<div class="detail-bio"><span class="detail-bio-label">sobre o autor</span>${escHtml(b.biografia_autor)}</div>` : ''}
    `;

    document.getElementById('detail-overlay').classList.add('open');
    window.scrollTo(0, 0);
  }

  function closeDetail() {
    document.getElementById('detail-overlay').classList.remove('open');
  }

  document.getElementById('detail-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('detail-overlay')) closeDetail();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetail();
  });

  function formatDate(s) {
    if (!s) return '';
    return new Intl.DateTimeFormat('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' })
      .format(new Date(s + 'T12:00:00'));
  }

  const CONTRIBUTOR_TYPES = {
    A01: 'autor', A12: 'ilustrador', A38: 'ilustrador', B06: 'tradução',
    B01: 'edição', A36: 'direção de arte', A11: 'fotografias', A09: 'introdução',
  };

  function formatContributors(contributors) {
    if (!contributors || !contributors.length) return '';
    const groups = {};
    for (const c of contributors) {
      const role = CONTRIBUTOR_TYPES[c.type] || null;
      if (!role) continue;
      const name = c.groupName || [c.firstName, c.lastName].filter(Boolean).join(' ');
      if (!name) continue;
      if (!groups[role]) groups[role] = [];
      groups[role].push(escHtml(name));
    }
    return Object.entries(groups)
      .map(([role, names]) => `<span class="contrib-role">${role}:</span> ${names.join(', ')}`)
      .join(' &nbsp;·&nbsp; ');
  }

  function escHtml(s = '') {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  init();
</script>
</body>
</html>
