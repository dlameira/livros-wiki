<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lançamentos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #161616;
      --border: #242424;
      --text: #e0d8ce;
      --muted: #666;
      --accent: #c9a84c;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      padding: 32px 48px 0;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.06em;
      color: #f0e8dc;
      margin-bottom: 6px;
    }

    header p {
      font-size: 0.82rem;
      color: var(--muted);
    }

    /* ── FILTROS ── */
    .filters {
      padding: 24px 48px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 0.78rem;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
      font-family: inherit;
    }

    .pill:hover { border-color: #444; color: #aaa; }

    .pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f0f0f;
    }

    /* ── STATUS ── */
    .status {
      padding: 16px 48px 0;
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 32px;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 28px 20px;
      padding: 24px 48px 80px;
    }

    .book-card {
      cursor: pointer;
      transition: transform 0.15s;
    }

    .book-card:hover { transform: translateY(-4px); }
    .book-card:hover .card-title { color: var(--accent); }

    .cover-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 2/3;
      background: var(--surface);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 9px;
    }

    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s;
    }

    .cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 2rem;
    }

    .card-title {
      font-size: 0.82rem;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color 0.15s;
    }

    .card-author {
      font-size: 0.73rem;
      color: var(--muted);
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .card-publisher {
      font-size: 0.68rem;
      color: #555;
    }

    .card-date {
      font-size: 0.68rem;
      color: #444;
    }

    .empty {
      grid-column: 1/-1;
      text-align: center;
      color: #333;
      padding: 80px 0;
      font-size: 0.9rem;
    }

    /* ── DETALHE ── */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 40px 20px;
    }

    .detail-overlay.open { display: flex; }

    .detail-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 680px;
      max-width: 100%;
      padding: 0;
      overflow: hidden;
      position: relative;
    }

    .detail-back {
      position: absolute;
      top: 16px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      border: 1px solid #333;
      color: #aaa;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      z-index: 10;
      transition: background 0.15s;
    }
    .detail-back:hover { background: rgba(0,0,0,0.8); color: #fff; }

    .detail-hero {
      display: flex;
      gap: 0;
      min-height: 280px;
    }

    .detail-cover {
      width: 180px;
      flex-shrink: 0;
      background: #111;
    }

    .detail-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .detail-cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2a2a2a;
      font-size: 3rem;
    }

    .detail-header {
      flex: 1;
      padding: 48px 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: linear-gradient(to bottom, #111 0%, var(--surface) 100%);
    }

    .detail-publisher-badge {
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .detail-title {
      font-size: 1.4rem;
      font-weight: normal;
      line-height: 1.3;
      color: #f0e8dc;
      margin-bottom: 6px;
    }

    .detail-author {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 12px;
    }

    .detail-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .detail-tag {
      font-size: 0.72rem;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: #666;
    }

    .detail-body {
      padding: 24px 28px 32px;
    }

    .detail-sinopse {
      font-size: 0.88rem;
      line-height: 1.7;
      color: #aaa;
    }

    .detail-sinopse p { margin-bottom: 12px; }
    .detail-sinopse p:last-child { margin-bottom: 0; }
  </style>
</head>
<body>

<header>
  <h1>lançamentos</h1>
  <p>acompanhe os novos livros das editoras selecionadas</p>
</header>

<div class="filters" id="filters">
  <button class="pill active" data-pub="all" onclick="setFilter('all', this)">todos</button>
</div>

<div class="status" id="status"></div>

<div class="grid" id="grid"></div>

<!-- Detalhe -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel" id="detail-panel">
    <button class="detail-back" onclick="closeDetail()">← voltar</button>
    <div class="detail-hero">
      <div class="detail-cover" id="detail-cover"></div>
      <div class="detail-header" id="detail-header"></div>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
  const DIRECTUS_URL   = 'https://directus-production-afdd.up.railway.app';
  const DIRECTUS_TOKEN = '73IhvvuNMBy-et-_0Ore5ZH2jo25pnU5';

  let allBooks = [];
  let currentFilter = 'all';

  // ── INIT ──

  async function init() {
    await fetchAll();
  }

  // ── FETCH ──

  async function fetchAll() {
    setStatus('carregando...');
    try {
      const cutoff = new Date();
      cutoff.setMonth(cutoff.getMonth() - 3);
      const dateStr = cutoff.toISOString().split('T')[0];

      const url = `${DIRECTUS_URL}/items/biblioteca`
        + `?filter[data_publicacao][_gte]=${dateStr}`
        + `&sort=-data_publicacao`
        + `&limit=500`
        + `&fields=id,isbn,titulo,autor,editora,capa_url,sinopse,data_publicacao,ano`;

      const r = await fetch(url, {
        headers: { Authorization: `Bearer ${DIRECTUS_TOKEN}` }
      });
      const j = await r.json();
      const raw = j.data || [];
      const seen = new Set();
      allBooks = raw.filter(b => {
        const key = (b.titulo || '').toLowerCase().trim();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      buildFilters();
      renderGrid();
      setStatus(`${allBooks.length} lançamento${allBooks.length !== 1 ? 's' : ''} nos últimos 3 meses`);
    } catch(e) {
      setStatus('erro ao carregar lançamentos');
      console.error(e);
    }
  }

  // ── FILTROS (construído dinamicamente a partir dos dados) ──

  function buildFilters() {
    const container = document.getElementById('filters');
    // mantém só o botão "todos"
    container.innerHTML = '<button class="pill active" data-pub="all" onclick="setFilter(\'all\', this)">todos</button>';

    const editoras = [...new Set(allBooks.map(b => b.editora).filter(Boolean))].sort();
    editoras.forEach(ed => {
      const btn = document.createElement('button');
      btn.className = 'pill';
      btn.textContent = ed;
      btn.dataset.pub = ed;
      btn.onclick = () => setFilter(ed, btn);
      container.appendChild(btn);
    });
  }

  function setFilter(pub, btn) {
    currentFilter = pub;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  }

  // ── RENDER GRID ──

  function renderGrid() {
    const books = currentFilter === 'all'
      ? allBooks
      : allBooks.filter(b => b.editora === currentFilter);

    const grid = document.getElementById('grid');

    if (!books.length) {
      grid.innerHTML = '<div class="empty">nenhum lançamento encontrado</div>';
      return;
    }

    grid.innerHTML = books.map((b, i) => `
      <div class="book-card" onclick="openDetail(${i})">
        <div class="cover-wrap">
          ${b.capa_url
            ? `<img src="${escHtml(b.capa_url)}" alt="${escHtml(b.titulo)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=cover-placeholder>📖</div>'">`
            : '<div class="cover-placeholder">📖</div>'
          }
        </div>
        <div class="card-title">${escHtml(b.titulo)}</div>
        <div class="card-author">${escHtml(b.autor)}</div>
        <div class="card-meta">
          <span class="card-publisher">${escHtml(b.editora)}</span>
          ${b.data_publicacao ? `<span class="card-date">· ${formatDate(b.data_publicacao)}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  // ── DETALHE ──

  function openDetail(index) {
    const books = currentFilter === 'all'
      ? allBooks
      : allBooks.filter(b => b.editora === currentFilter);
    const b = books[index];
    if (!b) return;

    document.getElementById('detail-cover').innerHTML = b.capa_url
      ? `<img src="${escHtml(b.capa_url)}" alt="${escHtml(b.titulo)}" onerror="this.parentElement.innerHTML='<div class=detail-cover-placeholder>📖</div>'">`
      : '<div class="detail-cover-placeholder">📖</div>';

    document.getElementById('detail-header').innerHTML = `
      <div class="detail-publisher-badge">${escHtml(b.editora)}</div>
      <div class="detail-title">${escHtml(b.titulo)}</div>
      <div class="detail-author">${escHtml(b.autor)}</div>
      <div class="detail-tags">
        ${b.data_publicacao ? `<span class="detail-tag">lançamento ${formatDate(b.data_publicacao)}</span>` : ''}
        ${b.isbn ? `<span class="detail-tag">ISBN ${escHtml(b.isbn)}</span>` : ''}
      </div>
    `;

    document.getElementById('detail-body').innerHTML = b.sinopse
      ? `<div class="detail-sinopse">${b.sinopse.split('\n').filter(Boolean).map(p => `<p>${escHtml(p)}</p>`).join('')}</div>`
      : '<div class="detail-sinopse" style="color:#444">sinopse não disponível</div>';

    document.getElementById('detail-overlay').classList.add('open');
    window.scrollTo(0, 0);
  }

  function closeDetail() {
    document.getElementById('detail-overlay').classList.remove('open');
  }

  document.getElementById('detail-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('detail-overlay')) closeDetail();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetail();
  });

  function formatDate(s) {
    if (!s) return '';
    return new Intl.DateTimeFormat('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' })
      .format(new Date(s + 'T12:00:00'));
  }

  function escHtml(s = '') {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  init();
</script>
</body>
</html>
