name: Atualizar Lançamentos

on:
  schedule:
    - cron: '0 6,12,18 * * *'   # 3x por dia
  push:
    branches: [master]
  workflow_dispatch:              # permite rodar manualmente

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Buscar dados da Metabooks
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.parse, os, re

          META_TOKEN = os.environ['META_TOKEN']
          META_BASE  = 'https://www.metabooks.com/api/v2'
          PAGE_SIZE  = 40

          PUBLISHERS = [
            {"label": "Companhia das Letras", "search": "Companhia das Letras"},
            {"label": "Intrínseca",           "search": "Intrinseca"},
            {"label": "Seiva",                "search": "Seiva"},
            {"label": "Rocco",                "search": "Rocco"},
            {"label": "Todavia",              "search": "Todavia"},
            {"label": "Fósforo",              "search": "Fosforo Editora"},
            {"label": "Darkside",             "search": "Darkside"},
            {"label": "Autêntica",            "search": "Autentica"},
            {"label": "Arqueiro",             "search": "Arqueiro"},
            {"label": "Record",               "search": "Record"},
          ]

          def fetch(url):
            req = urllib.request.Request(url, headers={'User-Agent': 'livros-wiki/1.0'})
            with urllib.request.urlopen(req, timeout=15) as r:
              return json.loads(r.read().decode())

          def strip_html(s):
            return re.sub(r'<[^>]+>', '', s or '').strip()

          def normalize(s):
            import unicodedata
            s = unicodedata.normalize('NFD', s.lower())
            s = ''.join(c for c in s if unicodedata.category(c) != 'Mn')
            return re.sub(r'[^a-z0-9 ]', '', s).strip()

          all_books = []

          for pub in PUBLISHERS:
            print(f"Buscando: {pub['label']}...")
            try:
              # Pega total de páginas
              url1 = (f"{META_BASE}/products?access_token={META_TOKEN}"
                      f"&search={urllib.parse.quote(pub['search'])}&size=1&sort=createDate")
              j1 = fetch(url1)
              total_pages = j1.get('totalPages', 1)
              last_page   = max(0, total_pages - 1)

              # Busca última página
              url2 = (f"{META_BASE}/products?access_token={META_TOKEN}"
                      f"&search={urllib.parse.quote(pub['search'])}&size={PAGE_SIZE}"
                      f"&sort=createDate&page={last_page}")
              j2 = fetch(url2)
              items = j2.get('content', [])

              pub_norm  = normalize(pub['search'])
              pub_first = normalize(pub['search'].split()[0])

              for b in items:
                bp = normalize(b.get('publisher', ''))
                if pub_norm not in bp and pub_first not in bp:
                  continue
                all_books.append({
                  "isbn":        (b.get('gtin') or b.get('isbn') or '').replace('-','').replace(' ',''),
                  "title":       b.get('title') or '—',
                  "author":      b.get('author') or '',
                  "publisher":   b.get('publisher') or pub['label'],
                  "pubLabel":    pub['label'],
                  "createDate":  b.get('createDate') or '',
                  "releaseDate": b.get('publicationDate') or b.get('onSaleDate') or '',
                  "coverUrl":    b.get('coverUrl') or '',
                  "sinopse":     strip_html(b.get('mainDescription') or b.get('shortDescription')),
                  "edition":     b.get('edition') or '',
                  "price":       b.get('priceBrl'),
                })

              print(f"  → {len([x for x in all_books if x['pubLabel']==pub['label']])} livros")

            except Exception as e:
              print(f"  ERRO: {e}")

          # Ordena por createDate desc
          def date_val(b):
            s = b.get('createDate','')
            if not s: return ''
            if '/' in s:
              parts = s.split('/')
              return f"{parts[2]}-{parts[1]}-{parts[0]}"
            return s

          all_books.sort(key=date_val, reverse=True)

          os.makedirs('data', exist_ok=True)
          with open('data/lancamentos.json', 'w', encoding='utf-8') as f:
            json.dump({"updated": __import__('datetime').datetime.utcnow().isoformat()+"Z",
                       "books": all_books}, f, ensure_ascii=False, indent=2)

          print(f"\nTotal: {len(all_books)} livros → data/lancamentos.json")
          PYEOF

      - name: Commit se houve mudanças
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/lancamentos.json
          git diff --cached --quiet || git commit -m "data: atualiza lançamentos $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
